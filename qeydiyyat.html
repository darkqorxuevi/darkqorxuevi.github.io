<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yarışma Qeydiyyatı</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; }
        .form-container { max-width: 400px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #111; color: white; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; }
        .phone-container { position: relative; }
        #submitBtn:disabled { background: #444; cursor: not-allowed; }
        #submitBtn { background: #ff4d4d; color: white; border: none; width: 100%; padding: 15px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .success-popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 style="text-align: center;">Yarışma Qeydiyyatı</h2>
    
    <input type="text" id="muallim" placeholder="Müəllimin adı (Könüllü)" oninput="this.value = this.value.replace(/[^a-zA-ZəıöğçşüƏİÖĞÇŞÜ\s]/g, '')">
    
    <input type="text" id="kapitan" placeholder="Komanda Kapitanı (Ad Soyad)*" required oninput="this.value = this.value.replace(/[^a-zA-ZəıöğçşüƏİÖĞÇŞÜ\s]/g, ''); checkForm();">
    
    <input type="text" id="phone" value="+994 " oninput="formatPhone(this); checkForm();">
    
    <input type="text" id="teamName" placeholder="Komanda Adı*" required oninput="checkForm()">
    
    <input type="text" id="school" placeholder="Məktəb*" required oninput="checkForm()">

    <select id="grade" onchange="checkForm()">
        <option value="">Sinif seçin*</option>
        <option value="5">5-ci sinif</option>
        <option value="6">6-cı sinif</option>
        <option value="7">7-ci sinif</option>
        <option value="8">8-ci sinif</option>
        <option value="9">9-cu sinif</option>
        <option value="10">10-cu sinif</option>
        <option value="11">11-ci sinif</option>
    </select>

    <button id="submitBtn" disabled onclick="submitRegistration()">Qeydiyyatı Tamamla</button>
</div>

<div class="success-popup" id="successPopup">
    <h2 style="color: #28a745;">Qeydiyyat Tamamlandı! ✅</h2>
    <p>İndi oyun üçün vaxt seçə bilərsiniz.</p>
    <button onclick="window.location.href='reserve.html'" style="padding:15px 30px; background:#ff4d4d; color:white; border:none; border-radius:5px; margin:10px; cursor:pointer;">Rezervasiya et</button>
    <button onclick="window.location.href='index.html'" style="padding:15px 30px; background:#444; color:white; border:none; border-radius:5px; margin:10px; cursor:pointer;">Ana səhifəyə qayıt</button>
</div>

<script>
    const SCRIPT_URL = "BURAYA_OZ_SCRIPT_URL_NU_YAPISDIR";

    function formatPhone(input) {
        if (!input.value.startsWith('+994 ')) input.value = '+994 ';
        let val = input.value.replace(/\D/g, '').substring(3);
        let formatted = '+994 ';
        if (val.length > 0) formatted += val.substring(0, 2);
        if (val.length > 2) formatted += ' ' + val.substring(2, 5);
        if (val.length > 5) formatted += ' ' + val.substring(5, 7);
        if (val.length > 7) formatted += ' ' + val.substring(7, 9);
        input.value = formatted;
    }

    function checkForm() {
        const kapitan = document.getElementById('kapitan').value.trim();
        const team = document.getElementById('teamName').value.trim();
        const school = document.getElementById('school').value.trim();
        const grade = document.getElementById('grade').value;
        const phone = document.getElementById('phone').value.length;

        document.getElementById('submitBtn').disabled = !(kapitan && team && school && grade && phone >= 17);
    }

    async function submitRegistration() {
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Yadda saxlanılır...";
        btn.disabled = true;

        const data = {
            type: "registration",
            muallim: document.getElementById('muallim').value,
            kapitan: document.getElementById('kapitan').value,
            phone: document.getElementById('phone').value,
            teamName: document.getElementById('teamName').value,
            school: document.getElementById('school').value,
            grade: document.getElementById('grade').value
        };

        try {
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
            document.getElementById('successPopup').style.display = 'flex';
        } catch (e) {
            alert("Xəta baş verdi!");
            btn.disabled = false;
            btn.innerText = "Qeydiyyatı Tamamla";
        }
    }
</script>
</body>
</html>
