<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yarışma Qeydiyyatı</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 20px; }
        .form-container { max-width: 400px; margin: auto; background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ff4d4d; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:disabled { background: #555; cursor: not-allowed; }
        .popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        .popup-box { background: #222; padding: 30px; border-radius: 10px; text-align: center; border: 1px solid #ff4d4d; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 style="color: #ff4d4d; text-align: center;">Yarışma Qeydiyyatı</h2>
    
    <input type="text" id="teacherName" placeholder="Müəllim Adı (Könüllü)" oninput="onlyLetters(this)">
    <input type="text" id="captainName" placeholder="Komanda Kapitanı (Məcburi)" oninput="onlyLetters(this)">
    
    <input type="tel" id="phone" value="+994 " oninput="phoneMask(this)" maxlength="19">
    
    <input type="text" id="school" placeholder="Məktəb Nömrəsi və ya Adı">
    
    <div style="display: flex; gap: 10px;">
        <select id="grade">
            <option value="">Sinif</option>
            <option value="5">5</option><option value="6">6</option><option value="7">7</option>
            <option value="8">8</option><option value="9">9</option><option value="10">10</option>
            <option value="11">11</option>
        </select>
        <select id="gradeIndex">
            <option value="">Bölmə</option>
            <option value="A">A</option><option value="B">B</option><option value="C">C</option>
            <option value="D">D</option><option value="E">E</option><option value="R">R</option>
        </select>
    </div>

    <button id="submitBtn" onclick="submitRegistration()" disabled>Qeydiyyatı Tamamla</button>
</div>

<div class="popup" id="successPopup">
    <div class="popup-box">
        <h3>Qeydiyyat uğurludur! ✅</h3>
        <p>İndi oyun vaxtını seçə bilərsiniz.</p>
        <button onclick="location.href='reserve.html'" style="margin-bottom: 10px;">Rezervasiya Et</button>
        <button onclick="location.href='index.html'" style="background: #333;">Ana Səhifəyə Qayıt</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "SENIN_GOOGLE_SCRIPT_URL_BURAYA"; // Google Script URL-ni bura yapışdır

    // Yalnız hərflər funksiyası
    function onlyLetters(input) {
        input.value = input.value.replace(/[^a-zA-ZəıöğçşüƏİÖĞÇŞÜ\s]/g, "");
        checkForm();
    }

    // Telefon maskası (+994 xx xxx xx xx)
    function phoneMask(input) {
        if (!input.value.startsWith("+994 ")) {
            input.value = "+994 ";
        }
        let val = input.value.replace(/\D/g, "").substring(3);
        let formatted = "+994 ";
        if (val.length > 0) formatted += val.substring(0, 2);
        if (val.length > 2) formatted += " " + val.substring(2, 5);
        if (val.length > 5) formatted += " " + val.substring(5, 7);
        if (val.length > 7) formatted += " " + val.substring(7, 9);
        input.value = formatted;
        checkForm();
    }

    function checkForm() {
        const captain = document.getElementById("captainName").value.trim();
        const phone = document.getElementById("phone").value.length;
        const school = document.getElementById("school").value.trim();
        const grade = document.getElementById("grade").value;
        const index = document.getElementById("gradeIndex").value;
        
        document.getElementById("submitBtn").disabled = !(captain && phone === 19 && school && grade && index);
    }

    document.querySelectorAll("input, select").forEach(el => el.onchange = checkForm);

    async function submitRegistration() {
        const btn = document.getElementById("submitBtn");
        btn.innerText = "Göndərilir...";
        btn.disabled = true;

        const data = {
            action: "registerCompetition",
            teacher: document.getElementById("teacherName").value,
            captain: document.getElementById("captainName").value,
            phone: document.getElementById("phone").value,
            school: document.getElementById("school").value,
            grade: document.getElementById("grade").value + document.getElementById("gradeIndex").value
        };

        try {
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
            document.getElementById("successPopup").style.display = "flex";
        } catch (e) {
            alert("Xəta baş verdi. Yenidən yoxlayın.");
            btn.disabled = false;
            btn.innerText = "Qeydiyyatı Tamamla";
        }
    }
</script>
</body>
</html>
