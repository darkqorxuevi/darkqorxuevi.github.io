<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Dark Qorxu Evi - Yarışma Qeydiyyatı</title>
    <style>
        body { background-color: #050505; color: white; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; padding: 20px; }
        .box { background: #111; border: 2px solid #600; padding: 20px; width: 100%; max-width: 400px; box-shadow: 0 0 20px #400; }
        h2 { color: #f00; text-align: center; text-transform: uppercase; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #888; }
        input, select { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        input:focus { border-color: #f00; outline: none; }
        .row { display: flex; gap: 10px; }
        button { width: 100%; padding: 15px; background: #800; color: #fff; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #f00; }
    </style>
</head>
<body>

<div class="box">
    <h2>MƏKTƏB YARIŞMASI</h2>
    <form id="compForm">
        <div class="input-group">
            <label>Qrup Rəhbəri (Ad Soyad) *</label>
            <input type="text" id="groupLeader" required>
        </div>

        <div class="input-group">
            <label>Müəllim Adı (isteğe bağlı)</label>
            <input type="text" id="teacherName">
        </div>

        <div class="input-group">
            <label>Məktəb *</label>
            <input type="text" id="school" required placeholder="Məs: 156 nömrəli">
        </div>

        <div class="row">
            <div class="input-group" style="flex:1">
                <label>Sinif *</label>
                <select id="grade" required>
                    <option value="">Seç</option>
                    <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option><option>11</option>
                </select>
            </div>
            <div class="input-group" style="flex:1">
                <label>İndeks *</label>
                <select id="index" required>
                    <option value="">Seç</option>
                    <option>A</option><option>B</option><option>C</option><option>D</option><option>E</option><option>F</option><option>G</option><option>R</option><option>P</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Əlaqə nömrəsi (+994 XX XXX XX XX) *</label>
            <input type="tel" id="phone" value="+994 " maxlength="17" required>
        </div>

        <div class="input-group">
            <label>Rezerv Eden *</label>
            <input type="text" id="reserverName" required>
        </div>

        <div class="row">
            <div class="input-group" style="flex:1">
                <label>Gün *</label>
                <input type="date" id="date" required>
            </div>
            <div class="input-group" style="flex:1">
                <label>Saat (Tam saat) *</label>
                <select id="time" required>
                    <option value="">Seç</option>
                    <option>10:00</option><option>11:00</option><option>12:00</option><option>13:00</option>
                    <option>14:00</option><option>15:00</option><option>16:00</option><option>17:00</option>
                    <option>18:00</option><option>19:00</option><option>20:00</option><option>21:00</option>
                </select>
            </div>
        </div>

        <button type="submit" id="submitBtn">REZERVİ TƏSDİQLƏ</button>
    </form>
</div>

<script>
    // Telefon nömrəsini avtomatik formatlamaq (+994 50 123 45 67)
    document.getElementById('phone').addEventListener('input', function (e) {
        let input = e.target.value.replace(/\D/g, ''); // Rəqəm olmayanları sil
        if (input.length > 3) {
            let formatted = "+" + input.substring(0, 3);
            if (input.length > 3) formatted += " " + input.substring(3, 5);
            if (input.length > 5) formatted += " " + input.substring(5, 8);
            if (input.length > 8) formatted += " " + input.substring(8, 10);
            if (input.length > 10) formatted += " " + input.substring(10, 12);
            e.target.value = formatted;
        }
    });

    const WEB_APP_URL = "SENİN_GOOGLE_SCRIPT_URL_BURAYA"; 

    document.getElementById('compForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "GÖNDƏRİLİR...";

        const payload = {
            groupLeader: document.getElementById('groupLeader').value,
            teacherName: document.getElementById('teacherName').value,
            school: document.getElementById('school').value,
            grade: document.getElementById('grade').value,
            index: document.getElementById('index').value,
            phone: document.getElementById('phone').value,
            reserverName: document.getElementById('reserverName').value,
            date: document.getElementById('date').value,
            time: document.getElementById('time').value
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        }).then(() => {
            alert("Yarışma qeydiyyatı eyni cədvələ əlavə edildi!");
            location.reload();
        }).catch(err => {
            alert("Xəta baş verdi!");
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
