<!DOCTYPE html>
<html lang="az">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müştəri Rəyləri - DARK Horror House</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 90%;
            max-width: 800px;
            margin: 50px auto;
            text-align: center;
        }
        h1 {
            color: red;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid red;
            display: inline-block;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .review-item {
            background: #111;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            border-left: 5px solid red;
            text-align: left;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.1);
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .reviewer-name {
            color: red;
            font-weight: bold;
            font-size: 18px;
        }
        .admin-badge {
            background: red;
            color: white;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: bold;
        }
        .review-text {
            color: #ddd;
            line-height: 1.6;
            font-size: 16px;
        }
        .review-footer {
            margin-top: 15px;
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }
        .like-count {
            color: #ff4444;
            font-weight: bold;
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 25px;
            background: red;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: darkred;
            transform: scale(1.05);
        }
        #loading {
            color: gray;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Qonaqlarımızın Rəyləri</h1>
        
        <div id="allReviews">
            <p id="loading">Rəylər yüklənir, zəhmət olmasa gözləyin...</p>
        </div>

        <a href="index.html" class="back-btn">← Ana Səhifəyə Qayıt</a>
    </div>

    <script>
        // Sənin Google Script URL-in
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzC2Or58ry4WSpllHfM58eG_gmFa5A4LGjv-NUnrT_Rk4mnm5BopssJ30q8YuOeaX9X/exec'; 

        async function fetchAllReviews() {
            const div = document.getElementById("allReviews");
            try {
                const res = await fetch(`${scriptURL}?action=read`);
                const data = await res.json();
                
                if (data.length === 0) {
                    div.innerHTML = "<p>Hələ heç bir rəy yazılmayıb.</p>";
                    return;
                }

                div.innerHTML = data.map(r => `
                    <div class="review-item">
                        <div class="review-header">
                            <span class="reviewer-name">${r.name}</span>
                            ${r.adminLike == "true" ? '<span class="admin-badge">❤ DARK TƏRƏFİNDƏN BƏYƏNİLİB</span>' : ''}
                        </div>
                        <p class="review-text">"${r.text}"</p>
                        <div class="review-footer">
                            <span>Tarix: ${r.date}</span>
                            <span class="like-count">❤ ${r.likes || 0} Bəyənmə</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                div.innerHTML = "<p style='color:red;'>Rəyləri yükləmək mümkün olmadı. Yenidən yoxlayın.</p>";
            }
        }

        // Səhifə yüklənəndə rəyləri gətir
        window.onload = fetchAllReviews;
    </script>
</body>
</html>
