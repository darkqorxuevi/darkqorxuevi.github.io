<!DOCTYPE html>
<html lang="az">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qonaq Rəyləri - DARK Horror House</title>
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* Səhifənin Ümumi Stilləri - Aydınlıq artırıldı */
        body {
            background-color: #0a0a0a;
            /* Fon şəklini daha aydın etmək üçün gradient şəffaflığı artırıldı */
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('logo.png'); 
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Topbar - Daha səliqəli */
        .reviews-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(20, 20, 20, 0.9);
            border-bottom: 2px solid red;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.2);
        }

        /* Ana səhifəyə qayıt düyməsi - Kiçik və Səliqəli */
        .back-btn-top {
            display: inline-flex;
            align-items: center;
            text-decoration: none !important;
            background: transparent;
            color: #fff !important;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid red;
            transition: 0.3s;
            font-size: 12px; /* Kiçik ölçü */
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-btn-top:hover {
            background: red;
            color: white !important;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* Başlıq */
        h1.reviews-title {
            color: #ff0000;
            text-transform: uppercase;
            font-size: 18px;
            margin: 0;
            text-shadow: 0 0 10px #ff0000;
            text-align: center;
            flex-grow: 1;
        }

        /* Rəylərin yerləşdiyi konteyner */
        .reviews-main {
            flex-grow: 1;
            width: 95%;
            max-width: 800px;
            margin: 30px auto;
            padding: 10px;
        }

        /* Rəy Qutusu - Daha aydın fon */
        .review-item {
            background: rgba(40, 40, 40, 0.85); /* Qaranlıq azaldıldı */
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #444;
            border-left: 5px solid red;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: left;
            transition: 0.3s;
        }

        .review-item:hover {
            transform: translateY(-3px);
            background: rgba(50, 50, 50, 0.95);
            border-color: red;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        .reviewer-name {
            color: #ff3333; /* Daha parlaq qırmızı */
            font-weight: bold;
            font-size: 18px;
        }

        .admin-badge {
            background: #ff0000;
            color: white;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* Rəy mətni - Parlaq və oxunaqlı */
        .review-text {
            color: #ffffff; /* Tam ağ rəy mətni */
            font-size: 15px;
            line-height: 1.5;
            margin: 10px 0;
            font-style: normal;
        }

        .review-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #aaa;
            padding-top: 10px;
        }

        .review-date {
            color: #bbb;
        }

        .like-section {
            color: #ff4444;
            font-weight: bold;
        }

        #loading {
            color: #ccc;
            text-align: center;
            margin-top: 50px;
        }

        /* Sağ tərəfi balanslamaq üçün boşluq */
        .topbar-spacer {
            width: 120px;
        }

        @media (max-width: 600px) {
            .topbar-spacer { display: none; }
            h1.reviews-title { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="reviews-topbar">
        <a href="index.html" class="back-btn-top">
            ← Geri
        </a>
        <h1 class="reviews-title">QONAQLARIMIZIN RƏYLƏRİ</h1>
        <div class="topbar-spacer"></div> 
    </div>

    <div class="reviews-main">
        <div id="allReviews">
            <p id="loading">Rəylər yüklənir...</p>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzC2Or58ry4WSpllHfM58eG_gmFa5A4LGjv-NUnrT_Rk4mnm5BopssJ30q8YuOeaX9X/exec'; 

        function formatDate(dateStr) {
            try {
                if (!dateStr) return "";
                let date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr;
                const months = ["Yanvar", "Fevral", "Mart", "Aprel", "May", "İyun", "İyul", "Avqust", "Sentyabr", "Oktyabr", "Noyabr", "Dekabr"];
                return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
            } catch (e) { return dateStr; }
        }

        async function fetchAllReviews() {
            const div = document.getElementById("allReviews");
            try {
                const res = await fetch(`${scriptURL}?action=read`);
                const data = await res.json();
                
                if (data.length === 0) {
                    div.innerHTML = "<p id='loading'>Hələ rəy yazılmayıb.</p>";
                    return;
                }

                div.innerHTML = data.map(r => `
                    <div class="review-item">
                        <div class="review-header">
                            <span class="reviewer-name">${r.name}</span>
                            ${r.adminLike == "true" ? '<span class="admin-badge">❤ DARK BƏYƏNİB</span>' : ''}
                        </div>
                        <p class="review-text">${r.text}</p>
                        <div class="review-footer">
                            <span class="review-date">📅 ${formatDate(r.date)}</span>
                            <span class="like-section">❤ ${r.likes || 0} Bəyənmə</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                div.innerHTML = "<p id='loading' style='color:red;'>Xəta baş verdi.</p>";
            }
        }

        window.onload = fetchAllReviews;
    </script>
</body>
</html>
