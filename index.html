<!DOCTYPE html>
<html lang="az">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Səhifə</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Canlı dəstək butonu üçün xüsusi stillər */
        .live-support-btn {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            width: 80%; 
            max-width: 250px; 
            margin: 40px auto 0 auto;
            padding: 10px 20px; 
            font-size: 14px;
            border: none;
        }
        /* Loqo ölçüsü böyüdüldü */
        .live-support-icon {
            width: 35px; 
            height: 35px;
            object-fit: contain;
        }

        /* Musiqi butonu üçün topbar stili */
        #musicControl {
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: 0.3s;
        }

        #musicControl:hover {
            transform: scale(1.1);
        }

        /* Oyun haqqında məlumat qutusu */
        .game-info-container {
            background: rgba(15, 0, 0, 0.85);
            border: 1px solid #ff0000;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            color: white;
            text-align: center;
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
            padding: 30px 20px;
            font-family: Arial, sans-serif;
        }
        .game-info-container p {
            font-size: 18px;
            margin: 12px 0;
            letter-spacing: 1px;
        }
        .customer-count {
            font-size: 32px;
            font-weight: bold;
            color: #ff0000;
            margin-top: 25px;
            text-shadow: 0 0 15px #ff0000;
        }

        /* TikTok Göstəricisi (Game Info daxilində) */
        .tiktok-status-wrapper {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
        
        .tiktok-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            font-size: 15px;
        }

        /* Canlıda olmayanda (Buton deyil, sadə yazı) */
        .tiktok-badge.offline {
            background: rgba(255, 255, 255, 0.1);
            color: #888;
            border: 1px solid #444;
            pointer-events: none; /* Klikləməni bağlayır */
        }
        .tiktok-badge.offline .tiktok-dot {
            background: #555;
            box-shadow: none;
        }

        /* Canlıda olanda (Aktiv Buton) */
        .tiktok-badge.live-active {
            background: rgba(0, 255, 0, 0.15);
            color: #00ff00;
            border: 2px solid #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            pointer-events: auto; /* Klikləməni açır */
        }
        .tiktok-badge.live-active:hover {
            transform: scale(1.05);
            background: rgba(0, 255, 0, 0.25);
        }
        .tiktok-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .tiktok-badge.live-active .tiktok-dot {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse-green 1s infinite alternate;
        }

        @keyframes pulse-green {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.3); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="adminPopup" class="popup">
        <div class="popup-box">
            <span class="close-btn" onclick="closeAdminPopup()">✕</span>
            <h2>Admin Girişi</h2>
            <input type="password" id="adminPass" placeholder="Şifrəni daxil edin...">
            <button onclick="checkAdminPassword()" class="confirm-btn">Daxil Ol</button>
            <p id="errorMsg" style="color: red; display: none; margin-top: 10px;">Şifrə səhvdir!</p>
        </div>
    </div>

    <div class="side-menu" id="menu">
        <a href="about.html">Haqqımızda</a>
        <a href="games.html">Oyunlarımız</a>
        <a href="location.html">Məkan</a>
        <a href="rejimler.html">Rejimler</a>
    </div>

    <header>
        <div class="topbar">
            <div id="musicControl" onclick="toggleMusic()">
                <span id="musicIcon">🔇</span>
            </div>
            <div class="topbar-title">Ana Səhifə</div>
