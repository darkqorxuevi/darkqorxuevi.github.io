<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana Səhifə</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="side-menu" id="menu">
    <a href="about.html">Haqqımızda</a>
    <a href="games.html">Oyunlarımız</a>
    <a href="prices.html">Qiymətlər</a>
    <a href="location.html">Məkan</a>
</div>

<header>

    <div class="topbar">
        <div class="topbar-title">Ana Səhifə</div>
        <div class="burger" onclick="toggleMenu()" id="burger">☰</div>
    </div>

    <div class="logo">
        <img src="logo.png" alt="Logo">
    </div>

    <div class="slogan">
        Qorxunun Ən Qaranlıq Nöqtəsinə Hazırsan?
    </div>

    <a class="reserve-btn"
       href="https://wa.me/994993121709?text=Salam,%20rezervasiya%20etmək%20istəyirəm"
       target="_blank">
       Rezervasiya Et
    </a>

</header>

<script>
function toggleMenu(){
    const menu = document.getElementById("menu");
    const burger = document.getElementById("burger");

    menu.classList.toggle("active");

    if(menu.classList.contains("active")){
        burger.innerHTML = "✕";
    } else {
        burger.innerHTML = "☰";
    }
}

window.addEventListener("scroll", function(){
    const menu = document.getElementById("menu");
    const burger = document.getElementById("burger");

    if(menu.classList.contains("active")){
        menu.classList.remove("active");
        burger.innerHTML = "☰";
    }
});
</script>

</body>
</html>
