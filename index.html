<body>

</div>

<div id="adminPopup" class="popup">
    <div class="popup-box">
        <span class="close-btn" onclick="closeAdminPopup()">✕</span>
        <h2>Admin Girişi</h2>
        <input type="password" id="adminPass" placeholder="Şifrəni daxil edin...">
        <button onclick="checkAdminPassword()" class="confirm-btn">Daxil Ol</button>
        <p id="errorMsg" style="color: red; display: none; margin-top: 10px;">Şifrə səhvdir!</p>
    </div>
</div>

<script>
function openAdminPopup() {
    document.getElementById("adminPopup").style.display = "flex";
}

function closeAdminPopup() {
    document.getElementById("adminPopup").style.display = "none";
    document.getElementById("errorMsg").style.display = "none";
}

function checkAdminPassword() {
    var pass = document.getElementById("adminPass").value;
    if (pass === "admindark1903") {
        window.location.href = "admin.html"; // Şifrə düzdürsə adminə göndər
    } else {
        document.getElementById("errorMsg").style.display = "block";
    }
}
</script>

<div class="side-menu" id="menu">
    <a href="about.html">Haqqımızda</a>

    <a href="rejimler.html">Rejimler</a>

</div>

<header>

    <div class="topbar">
        <div class="topbar-title">Ana Səhifə</div>

    </div>

        <img src="logo.png" alt="Logo">
    </div>

   

  <a href="reserve.html" class="reserve-btn">
Rezervasiya Et
</a>




</header>

    <div class="reserve-popup" id="reservePopup">

<div class="reserve-box">

<div class="close-btn" onclick="closeReserve()">✕</div>

<h2>Rezervasiya</h2>

<label>Tarix seç</label>
<input type="date" id="date">

<label>Saat seç</label>
<input type="time" id="time" step="1800">


<button class="reserve-btn" onclick="window.location.href='reserve.html'">

Rezerv Et
</button>

</div>
</div>

    
<script>
function toggleMenu(){
    const menu = document.getElementById("menu");
    const burger = document.getElementById("burger");

    menu.classList.toggle("active");

    if(menu.classList.contains("active")){
        burger.innerHTML = "✕";
        burger.classList.add("close");
    } else {
        burger.innerHTML = "☰";
        burger.classList.remove("close");
    }
}

/* Scroll edəndə bağlansın */
window.addEventListener("scroll", function(){
    const menu = document.getElementById("menu");
    const burger = document.getElementById("burger");

    if(menu.classList.contains("active")){
        menu.classList.remove("active");
        burger.innerHTML = "☰";
        burger.classList.remove("close");
    }
});
</script>

<script>

function openReserve(){
document.getElementById("reservePopup").style.display="flex";
}

function closeReserve(){
document.getElementById("reservePopup").style.display="none";
}

function sendReserve(){

let date=document.getElementById("date").value;
let time=document.getElementById("time").value;

let slot=date+"-"+time;

let reserved=JSON.parse(localStorage.getItem("reservedSlots")) || [];

if(reserved.includes(slot)){
alert("Bu saat əvvəlcədən rezerv olunub");
return;
}

reserved.push(slot);
localStorage.setItem("reservedSlots",JSON.stringify(reserved));

let message=`Salam, mən ${date}, saat ${time} rezerv etmək istəyirəm`;

let url=`https://wa.me/994993121709?text=${encodeURIComponent(message)}`;

window.open(url,"_blank");

}


</script>
