<script>
function toggleMenu(){
    const menu = document.getElementById("menu");
    const burger = document.getElementById("burger");
    menu.classList.toggle("active");
    if(menu.classList.contains("active")){
        burger.innerHTML = "✕";
        burger.classList.add("close");
    } else {
        burger.innerHTML = "☰";
        burger.classList.remove("close");
    }
}
window.addEventListener("scroll", function(){
    const menu = document.getElementById("menu");
    const burger = document.getElementById("burger");
    if(menu.classList.contains("active")){
        menu.classList.remove("active");
        burger.innerHTML = "☰";
        burger.classList.remove("close");
    }
});
</script>

<script>
function openReserve(){ document.getElementById("reservePopup").style.display="flex"; }
function closeReserve(){ document.getElementById("reservePopup").style.display="none"; }

function sendReserve(){
    let date=document.getElementById("date").value;
    let time=document.getElementById("time").value;
    let slot=date+"-"+time;
    let reserved=JSON.parse(localStorage.getItem("reservedSlots")) || [];
    if(reserved.includes(slot)){
        alert("Bu saat əvvəlcədən rezerv olunub");
        return;
    }
    reserved.push(slot);
    localStorage.setItem("reservedSlots",JSON.stringify(reserved));
    let message=`Salam, mən ${date}, saat ${time} rezerv etmək istəyirəm`;
    let url=`https://wa.me/994993121709?text=${encodeURIComponent(message)}`;
    window.open(url,"_blank");
}
</script>

<script>
const audio = document.getElementById("bgMusic");
const musicIcon = document.getElementById("musicIcon");
if(audio) audio.volume = 0.2;

window.addEventListener("load", () => {
    const savedTime = localStorage.getItem("musicTime");
    const isPlaying = localStorage.getItem("musicPlaying") === "true";
    if (savedTime && audio) audio.currentTime = parseFloat(savedTime);
    if (isPlaying && audio) {
        let playAttempt = setInterval(() => {
            audio.play().then(() => {
                clearInterval(playAttempt);
                musicIcon.innerText = "🔊";
            }).catch(e => console.log("Musiqi gözləyir..."));
        }, 1000);
    }
});

if(audio) {
    audio.addEventListener("timeupdate", () => {
        localStorage.setItem("musicTime", audio.currentTime);
    });
}

function toggleMusic() {
    if (audio.paused) {
        audio.play();
        musicIcon.innerText = "🔊";
        localStorage.setItem("musicPlaying", "true");
    } else {
        audio.pause();
        musicIcon.innerText = "🔇";
        localStorage.setItem("musicPlaying", "false");
    }
}
</script>
