function toggleMenu(){

        burger.innerHTML = "‚úē";
        burger.classList.add("close");
    } else {
        burger.innerHTML = "‚ėį";
        burger.classList.remove("close");
    }
}

/* Scroll ed…ônd…ô bańülansńĪn */
window.addEventListener("scroll", function(){

</script>
