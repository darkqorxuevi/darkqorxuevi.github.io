<script>
function toggleMenu(){
    const menu = document.getElementById("menu");
    const burger = document.getElementById("burger");

    menu.classList.toggle("active");

    if(menu.classList.contains("active")){
        burger.innerHTML = "✕";
        burger.classList.add("close");
    } else {
        burger.innerHTML = "☰";
        burger.classList.remove("close");
    }
}

/* Scroll edəndə bağlansın */
window.addEventListener("scroll", function(){
    const menu = document.getElementById("menu");
    const burger = document.getElementById("burger");

    if(menu.classList.contains("active")){
        menu.classList.remove("active");
        burger.innerHTML = "☰";
        burger.classList.remove("close");
    }
});
</script>

function sendReserve(){
let date=document.getElementById("date").value;
let time=document.getElementById("time").value;
let slot=date+"-"+time;
let reserved=JSON.parse(localStorage.getItem("reservedSlots")) || [];

if(reserved.includes(slot)){
alert("Bu saat əvvəlcədən rezerv olunub");
return;
}

reserved.push(slot);
localStorage.setItem("reservedSlots",JSON.stringify(reserved));

let message=`Salam, mən ${date}, saat ${time} rezerv etmək istəyirəm`;
let url=`https://wa.me/994993121709?text=${encodeURIComponent(message)}`;
window.open(url,"_blank");
}
</script>

<script>
function openReservePage(){
    window.location.href = "reserve.html";
}

// === CANLI DƏSTƏK TELEGRAM BOT KODLARI ===
const telegramBotToken = "8733282097:AAEfZWuC0FnbtaJ2ngBYCzjw4oN1N_-Uhvk";
const telegramChatId = "7766487634";
let userNickname = "";
let chatUpdateInterval;
let lastUpdateId = 0;

function openLiveChat() {
    document.getElementById("liveChatPopup").style.display = "flex";
}

function closeLiveChat() {
    document.getElementById("liveChatPopup").style.display = "none";
}

function startChat() {
    const nickInput = document.getElementById("chatNick").value.trim();
    if(nickInput === "") {
        alert("Xahiş edirik nick daxil edin!");
        return;
    }
    userNickname = nickInput;
    document.getElementById("nickStep").style.display = "none";
    document.getElementById("chatStep").style.display = "flex";
    
    addMessageToChat("Sistem", `Xoş gəldiniz, ${userNickname}! Buyurun.`, "#ff4444");
    
    // Telegramdan mesajları yoxlamaq üçün interval (hər 3 saniyədən bir)
    chatUpdateInterval = setInterval(fetchTelegramMessages, 3000);
}

function sendChatMessage() {
    const msgInput = document.getElementById("chatMsgInput");
    const messageText = msgInput.value.trim();
    if(messageText === "") return;

    // Ekranda göstər
    addMessageToChat("Siz", messageText, "#4CAF50");
    msgInput.value = "";

    // Telegrama göndər
    const textToSend = `[${userNickname}] yazır:\n${messageText}`;
    fetch(`https://api.telegram.org/bot${telegramBotToken}/sendMessage?chat_id=${telegramChatId}&text=${encodeURIComponent(textToSend)}`)
    .catch(err => console.error("Xəta:", err));
}

function fetchTelegramMessages() {
    fetch(`https://api.telegram.org/bot${telegramBotToken}/getUpdates?offset=${lastUpdateId + 1}`)
    .then(res => res.json())
    .then(data => {
        if(data.ok && data.result.length > 0) {
            data.result.forEach(update => {
                lastUpdateId = update.update_id;
                if(update.message && update.message.text && update.message.chat.id.toString() === telegramChatId) {
                    const text = update.message.text;
                    
                    // Admin /sil yazarsa mesajlar təmizlənir
                    if(text.trim() === "/sil") {
                        document.getElementById("chatMessages").innerHTML = "";
                        addMessageToChat("Sistem", "Söhbət admin tərəfindən təmizləndi.", "gray");
                        return;
                    }

                    // Adminin bu istifadəçiyə cavab verib-vermədiyini yoxlayır (Məs: @nick salam)
                    const tag = `@${userNickname.toLowerCase()}`;
                    if(text.toLowerCase().startsWith(tag)) {
                        const replyText = text.substring(tag.length).trim();
                        addMessageToChat("Admin", replyText, "#2196F3");
                    }
                }
            });
        }
    })
    .catch(err => console.error(err));
}

function addMessageToChat(sender, text, color) {
    const chatBox = document.getElementById("chatMessages");
    chatBox.innerHTML += `<div style="margin-bottom: 8px;"><strong style="color: ${color};">${sender}:</strong> ${text}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
}

// Enter ilə mesaj göndərmək
document.getElementById("chatMsgInput").addEventListener("keyup", function(event) {
    if (event.key === "Enter") {
        sendChatMessage();
    }
});
</script>

<script>
    const audio = document.getElementById("bgMusic");
const musicIcon = document.getElementById("musicIcon");
if(audio) audio.volume = 0.2; // Səs səviyyəsi

window.addEventListener("load", () => {
    if(!audio) return;
    const savedTime = localStorage.getItem("musicTime");
    const isPlaying = localStorage.getItem("musicPlaying") === "true";

    if (savedTime) {
        audio.currentTime = parseFloat(savedTime);
    }

    if (isPlaying) {
        let playAttempt = setInterval(() => {
            audio.play().then(() => {
                clearInterval(playAttempt);
                musicIcon.innerText = "🔊";
            }).catch(e => console.log("Musiqi üçün klik gözlənilir..."));
        }, 1000);
    }
});

if(audio) {
    audio.addEventListener("timeupdate", () => {
        localStorage.setItem("musicTime", audio.currentTime);
    });
}

function toggleMusic() {
    if(!audio) return;
    if (audio.paused) {
        audio.play();
        musicIcon.innerText = "🔊";
        localStorage.setItem("musicPlaying", "true");
    } else {
        audio.pause();
        musicIcon.innerText = "🔇";
        localStorage.setItem("musicPlaying", "false");
    }
}
</script>
