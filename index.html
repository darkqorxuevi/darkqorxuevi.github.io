<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana Səhifə</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="side-menu" id="menu">
    <a href="about.html">Haqqımızda</a>
    <a href="games.html">Oyunlarımız</a>
    <a href="prices.html">Qiymətlər</a>
    <a href="location.html">Məkan</a>
    <a href="location.html">Rejimler</a>
</div>

<header>

    <div class="topbar">
        <div class="topbar-title">Ana Səhifə</div>
        <div class="burger" onclick="toggleMenu()" id="burger">☰</div>
    </div>

    <div class="logo">
        <img src="logo.png" alt="Logo">
    </div>

   

   <button class="reserve-btn" onclick="openReservePage()">
Rezervasiya Et
</button>



</header>

    <div class="reserve-popup" id="reservePopup">

<div class="reserve-box">

<div class="close-btn" onclick="closeReserve()">✕</div>

<h2>Rezervasiya</h2>

<label>Tarix seç</label>
<input type="date" id="date">

<label>Saat seç</label>
<input type="time" id="time" step="1800">


<button class="reserve-btn" onclick="window.location.href='reserve.html'">

Rezerv Et
</button>

</div>
</div>

    
<script>
function toggleMenu(){
    const menu = document.getElementById("menu");
    const burger = document.getElementById("burger");

    menu.classList.toggle("active");

    if(menu.classList.contains("active")){
        burger.innerHTML = "✕";
        burger.classList.add("close");
    } else {
        burger.innerHTML = "☰";
        burger.classList.remove("close");
    }
}

/* Scroll edəndə bağlansın */
window.addEventListener("scroll", function(){
    const menu = document.getElementById("menu");
    const burger = document.getElementById("burger");

    if(menu.classList.contains("active")){
        menu.classList.remove("active");
        burger.innerHTML = "☰";
        burger.classList.remove("close");
    }
});
</script>

<script>

function openReserve(){
document.getElementById("reservePopup").style.display="flex";
}

function closeReserve(){
document.getElementById("reservePopup").style.display="none";
}

function sendReserve(){

let date=document.getElementById("date").value;
let time=document.getElementById("time").value;

let slot=date+"-"+time;

let reserved=JSON.parse(localStorage.getItem("reservedSlots")) || [];

if(reserved.includes(slot)){
alert("Bu saat əvvəlcədən rezerv olunub");
return;
}

reserved.push(slot);
localStorage.setItem("reservedSlots",JSON.stringify(reserved));

let message=`Salam, mən ${date}, saat ${time} rezerv etmək istəyirəm`;

let url=`https://wa.me/994993121709?text=${encodeURIComponent(message)}`;

window.open(url,"_blank");

}


</script>
<script>
  const burger = document.getElementById("burger-menu");
  burger.addEventListener("click", () => {
    // Burger kliklənəndə rejimler.html səhifəsini aç
    window.location.href = 'rejimler.html';
  });
<script>
function openReservePage(){
    window.location.href = "reserve.html";
}
</script>

</body>
</html>
