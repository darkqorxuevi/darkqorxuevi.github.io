<!DOCTYPE html>
<html lang="az">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Səhifə</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Canlı dəstək butonu üçün xüsusi stillər */
        .live-support-btn {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            width: 80%; 
            max-width: 250px; 
            margin: 40px auto 0 auto; 
            padding: 10px 20px; 
            font-size: 14px;
            border: none;
        }
        .live-support-icon {
            width: 35px; 
            height: 35px;
            object-fit: contain;
        }

        /* Topbar daxilində elementlərin düzülüşü */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Elementləri künclərə yayır */
            padding: 0 15px;
            position: relative;
        }

        /* Musiqi butonu üçün stil */
        #musicControl {
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: 0.3s;
            z-index: 1100;
            width: 40px;
            height: 40px;
        }

        /* Başlığın tam mərkəzdə qalması üçün */
        .topbar-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        #musicControl:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div id="adminPopup" class="popup">
        <div class="popup-box">
            <span class="close-btn" onclick="closeAdminPopup()">✕</span>
            <h2>Admin Girişi</h2>
            <input type="password" id="adminPass" placeholder="Şifrəni daxil edin...">
            <button onclick="checkAdminPassword()" class="confirm-btn">Daxil Ol</button>
            <p id="errorMsg" style="color: red; display: none; margin-top: 10px;">Şifrə səhvdir!</p>
        </div>
    </div>

    <div class="side-menu" id="menu">
        <a href="about.html">Haqqımızda</a>
        <a href="games.html">Oyunlarımız</a>
        <a href="location.html">Məkan</a>
        <a href="rejimler.html">Rejimler</a>
    </div>

    <header>
        <div class="topbar">
            <div id="musicControl" onclick="toggleMusic()">
                <span id="musicIcon">🔇</span>
            </div>
            
            <div class="topbar-title">Ana Səhifə</div>
            <div class="burger" onclick="toggleMenu()" id="burger">☰</div>
        </div>

        <div class="logo">
            <img src="logo.png" alt="Logo">
        </div>

        <a href="reserve.html" class="reserve-btn">Rezervasiya Et</a>

        <button onclick="openLiveChat()" class="reserve-btn live-support-btn">
            <img src="chat-logo.png" alt="Support" class="live-support-icon">
            7/24 Canlı Dəstək
        </button>
    </header>

    <div class="reserve-popup" id="liveChatPopup" style="display: none; z-index: 1000;">
        <div class="reserve-box" style="display: flex; flex-direction: column; height: 400px; max-width: 350px;">
            <div class="close-btn" onclick="closeLiveChat()">✕</div>
            <h2>Canlı Dəstək</h2>

            <div id="nickStep">
                <label>Çata qoşulmaq üçün Nick yazın:</label>
                <input type="text" id="chatNick" placeholder="Nickinizi bura yazın...">
                <button class="reserve-btn" onclick="startChat()" style="margin-top: 15px;">Daxil Ol</button>
            </div>

            <div id="chatStep" style="display: none; flex-direction: column; flex-grow: 1; height: 100%;">
                <div id="chatMessages" style="flex-grow: 1; background: #111; border: 1px solid red; border-radius: 5px; padding: 10px; overflow-y: auto; text-align: left; margin-bottom: 10px; font-size: 14px; color: white;"></div>
                
                <div style="display: flex; gap: 5px; align-items: center;">
                    <input type="text" id="chatMsgInput" placeholder="Mesajınız..." style="flex-grow: 1; margin: 0; padding: 10px; height: 40px; box-sizing: border-box; background: #000; border: 1px solid red; color: white; border-radius: 5px;">
                    <button onclick="sendChatMessage()" class="reserve-btn" style="padding: 0 10px; margin: 0; width: 80px; min-width: 80px; font-size: 13px; height: 40px; border: none; border-radius: 5px;">Göndər</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="social-links">
                <a href="https://www.instagram.com/darkqorxuevi" target="_blank" class="social-item">
                    <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram">
                    <span>Instagram</span>
                </a>
                <a href="https://www.tiktok.com/@darkqorxuevi" target="_blank" class="social-item">
                    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok">
                    <span>TikTok</span>
                </a>
                <a href="https://wa.me/994993121709" target="_blank" class="social-item">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
                    <span>WhatsApp</span>
                </a>
            </div>
            <div class="footer-bottom">
                <p>© 2026 DARK Horror House. Bütün hüquqlar qorunur.</p>
                <span class="admin-link" onclick="openAdminPopup()" style="opacity:0.3; font-size:10px; cursor:pointer;">Admin Panel</span>
            </div>
        </div>
    </footer>

    <script>
        // MENU FUNKSİYALARI
        function toggleMenu(){
            const menu = document.getElementById("menu");
            const burger = document.getElementById("burger");
            menu.classList.toggle("active");
            burger.innerHTML = menu.classList.contains("active") ? "✕" : "☰";
        }

        window.addEventListener("scroll", function(){
            const menu = document.getElementById("menu");
            const burger = document.getElementById("burger");
            if(menu.classList.contains("active")){
                menu.classList.remove("active");
                burger.innerHTML = "☰";
            }
        });

        // ADMIN PANEL
        function openAdminPopup() { document.getElementById("adminPopup").style.display = "flex"; }
        function closeAdminPopup() { document.getElementById("adminPopup").style.display = "none"; }
        function checkAdminPassword() {
            var pass = document.getElementById("adminPass").value;
            if (pass === "admindark1903") { window.location.href = "admin.html"; }
            else { document.getElementById("errorMsg").style.display = "block"; }
        }

        // MUSİQİ İDARƏETMƏSİ (AVTOMATİK)
        const audio = document.getElementById("bgMusic");
        const musicIcon = document.getElementById("musicIcon");
        audio.volume = 0.2;

        function playMusic() {
            audio.play().then(() => {
                musicIcon.innerText = "🔊";
                // Uğurla başladısa klik dinləyicisini silirik
                document.removeEventListener('click', playMusic);
                document.removeEventListener('touchstart', playMusic);
                localStorage.setItem("musicPlaying", "true");
            }).catch(() => {
                console.log("Brauzer blokladı, istifadəçi hərəkəti gözlənilir...");
            });
        }

        window.addEventListener("load", () => {
            const savedTime = localStorage.getItem("musicTime");
            if (savedTime) audio.currentTime = parseFloat(savedTime);
            
            // Avtomatik başlatmağa çalış
            playMusic();
            
            // Brauzer bloklamasını aşmaq üçün hər hansı bir toxunuşda işə düşsün
            document.addEventListener('click', playMusic);
            document.addEventListener('touchstart', playMusic);
        });

        audio.addEventListener("timeupdate", () => {
            localStorage.setItem("musicTime", audio.currentTime);
        });

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                musicIcon.innerText = "🔊";
                localStorage.setItem("musicPlaying", "true");
            } else {
                audio.pause();
                musicIcon.innerText = "🔇";
                localStorage.setItem("musicPlaying", "false");
            }
        }

        // CANLI DƏSTƏK LOGİKASI
        const telegramBotToken = "8733282097:AAEfZWuC0FnbtaJ2ngBYCzjw4oN1N_-Uhvk";
        const telegramChatId = "7766487634";
        let userNickname = "";
        let lastUpdateId = 0;

        function openLiveChat() { document.getElementById("liveChatPopup").style.display = "flex"; }
        function closeLiveChat() { document.getElementById("liveChatPopup").style.display = "none"; }

        function startChat() {
            const nickInput = document.getElementById("chatNick").value.trim();
            if(!nickInput) return alert("Nick yazın!");
            userNickname = nickInput;
            document.getElementById("nickStep").style.display = "none";
            document.getElementById("chatStep").style.display = "flex";
            addMessageToChat("Sistem", `Xoş gəldiniz, ${userNickname}!`, "#ff4444");
            setInterval(fetchTelegramMessages, 3000);
        }

        function sendChatMessage() {
            const msgInput = document.getElementById("chatMsgInput");
            const text = msgInput.value.trim();
            if(!text) return;
            addMessageToChat("Siz", text, "#4CAF50");
            msgInput.value = "";
            fetch(`https://api.telegram.org/bot${telegramBotToken}/sendMessage?chat_id=${telegramChatId}&text=${encodeURIComponent("["+userNickname+"]: "+text)}`);
        }

        function fetchTelegramMessages() {
            fetch(`https://api.telegram.org/bot${telegramBotToken}/getUpdates?offset=${lastUpdateId + 1}`)
            .then(res => res.json())
            .then(data => {
                if(data.ok && data.result.length > 0) {
                    data.result.forEach(update => {
                        lastUpdateId = update.update_id;
                        if(update.message && update.message.text) {
                            const msg = update.message.text;
                            const tag = `@${userNickname.toLowerCase()}`;
                            if(msg.toLowerCase().startsWith(tag)) {
                                addMessageToChat("Admin", msg.substring(tag.length).trim(), "#2196F3");
                            }
                        }
                    });
                }
            });
        }

        function addMessageToChat(sender, text, color) {
            const chatBox = document.getElementById("chatMessages");
            chatBox.innerHTML += `<div><strong style="color:${color}">${sender}:</strong> ${text}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById("chatMsgInput").addEventListener("keyup", (e) => { if(e.key === "Enter") sendChatMessage(); });
    </script>
</body>
</html>
