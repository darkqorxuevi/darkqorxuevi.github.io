<!DOCTYPE html>

        /* Canlı Çat Düyməsi Üçün Özəl Stil (Loqo ilə) */

            background-image: url('chat-logo.png') !important;

        }

<div id="adminPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:20000; justify-content:center; align-items:center;">
    <div style="background:#111; padding:30px; border:1px solid red; border-radius:15px; text-align:center; width:90%; max-width:320px;">
        <h2 style="color:red; margin-bottom:20px;">Giriş</h2>
        <input type="password" id="adminPass" placeholder="Şifrə..." style="width:100%; padding:12px; background:#000; border:1px solid red; color:white; margin-bottom:15px;">
        <button onclick="checkAdminPassword()" style="width:100%; padding:12px; background:red; border:none; color:white; font-weight:bold; cursor:pointer;">DAXİL OL</button>
        <button onclick="closeAdminPopup()" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">Ləğv et</button>
        <p id="errorMsg" style="color:red; display:none; margin-top:10px;">Şifrə səhvdir!</p>
    </div>
</div>

<footer class="main-footer">
    <div class="footer-container">
        <div class="social-links">
            <a href="https://www.instagram.com/darkqorxuevi" target="_blank" class="social-item">
                <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram" width="20">
                <span>Instagram</span>
            </a>
            <a href="https://wa.me/994993121709" target="_blank" class="social-item">
                <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp" width="20">
                <span>WhatsApp</span>

        </div>
        <div class="footer-bottom">
            <p>© 2026 DARK Horror House.</p>
        </div>

<div id="musicControl" onclick="toggleMusic()" style="position:fixed; bottom:20px; left:20px; z-index:10000; cursor:pointer; background:rgba(0,0,0,0.6); padding:12px; border-radius:50%; border:1px solid #444;">
    <span id="musicIcon" style="font-size:24px;">🔇</span>
</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
    // --- Menyu və Admin funksiyaları ---
    function toggleMenu(){
        const menu = document.getElementById("menu");
        const burger = document.getElementById("burger");
        menu.classList.toggle("active");
        burger.innerHTML = menu.classList.contains("active") ? "✕" : "☰";
    }

    function openAdminPopup() { document.getElementById("adminPopup").style.display = "flex"; }
    function closeAdminPopup() { document.getElementById("adminPopup").style.display = "none"; }
    function checkAdminPassword() {
        var pass = document.getElementById("adminPass").value;
        if (pass === "admindark1903") { window.location.href = "admin.html"; } 
        else { document.getElementById("errorMsg").style.display = "block"; }
    }

    // --- Musiqi funksiyaları ---
    const audio = document.getElementById("bgMusic");
    const musicIcon = document.getElementById("musicIcon");
    audio.volume = 0.2;

    window.addEventListener("load", () => {
        const isPlaying = localStorage.getItem("musicPlaying") === "true";
        if (isPlaying) { audio.play().then(() => { musicIcon.innerText = "🔊"; }).catch(() => {}); }
    });

    function toggleMusic() {
        if (audio.paused) {
            audio.play();
            musicIcon.innerText = "🔊";
            localStorage.setItem("musicPlaying", "true");
        } else {
            audio.pause();
            musicIcon.innerText = "🔇";
            localStorage.setItem("musicPlaying", "false");
        }
    }
</script>

<script> 
    window.intergramId = "7766487634";

        cookieExpiration: 2,

        sendButtonText: "Göndər",
        displayMessageTime: true,

        alwaysUseFloatingButton: true,
        // Nick məcburi olsun deyə istifadəçini yönləndirən mətn
        closedChatDescription: "Dəstək xətti bağlıdır.",
        onMessageSent: function() {
            // Mesaj göndərildikdə əlavə bildiriş və ya log bura yazıla bilər
        }
    };
</script>
<script id="intergram" src="https://www.intergram.xyz/js/widget.js"></script>
