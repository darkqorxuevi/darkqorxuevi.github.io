<!DOCTYPE html>
<html lang="az">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Səhifə</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ... əvvəlki stillər ... */
        .live-support-btn { display: flex; align-items: center; justify-content: center; gap: 15px; width: 80%; max-width: 250px; margin: 40px auto 0 auto; padding: 10px 20px; font-size: 14px; border: none; }
        .live-support-icon { width: 35px; height: 35px; object-fit: contain; }
        #musicControl { cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; color: white; transition: 0.3s; }
        #musicControl:hover { transform: scale(1.1); }

        .game-info-container {
            background: rgba(15, 0, 0, 0.85);
            border: 1px solid #ff0000;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            color: white;
            text-align: center;
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
            padding: 30px 20px;
            font-family: Arial, sans-serif;
        }
        .game-info-container p { font-size: 18px; margin: 12px 0; letter-spacing: 1px; }
        .customer-count { font-size: 32px; font-weight: bold; color: #ff0000; margin-top: 25px; text-shadow: 0 0 15px #ff0000; }

        /* TikTok Butonu Düzəlişi */
        .tiktok-live-badge {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid red;
            color: white;
            padding: 10px 15px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            z-index: 1000;
            transition: all 0.3s ease;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer; /* Buton həmişə basıla bilsin */
        }
        .tiktok-live-badge.live-active { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
        .tiktok-dot { width: 12px; height: 12px; border-radius: 50%; background: red; box-shadow: 0 0 8px red; }
        .tiktok-live-badge.live-active .tiktok-dot { background: #00ff00; box-shadow: 0 0 10px #00ff00; animation: pulse-green 1s infinite alternate; }

        /* Ünvan Bölməsi */
        .address-section { margin-top: 30px; padding-top: 20px; border-top: 1px dashed rgba(255, 0, 0, 0.3); }
        .address-text { font-size: 16px; line-height: 1.5; color: #ccc; margin-bottom: 15px; }
        
        /* Xəritə Butonu Düzəlişi */
        .maps-btn {
            display: inline-block;
            background: #4285F4;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            transition: 0.3s;
            cursor: pointer;
        }
        .maps-btn:hover { background: #357ae8; transform: scale(1.05); }

        @keyframes pulse-green { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(1.3); opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="topbar">
            <div id="musicControl" onclick="toggleMusic()"><span id="musicIcon">🔇</span></div>
            <div class="topbar-title">Ana Səhifə</div>
            <div class="burger" onclick="toggleMenu()" id="burger">☰</div>
        </div>
        <div class="logo"><img src="logo.png" alt="Logo"></div>
        <a href="reserve.html" class="reserve-btn">Rezervasiya Et</a>
        <button onclick="openLiveChat()" class="reserve-btn live-support-btn">
            <img src="chat-logo.png" alt="Support" class="live-support-icon">
            7/24 Canlı Dəstək
        </button>
    </header>

    <div class="game-info-container">
        <p>⏱ Oyun müddəti: <strong>1 saat</strong></p>
        <p>💵 1 nəfər: <strong>10 AZN</strong></p>
        <p>👥 Oyuna minimum <strong>2</strong>, maksimum <strong>25</strong> nəfər girə bilər</p>
        <p>🎁 <strong>Qrup endirimləri mövcuddur</strong></p>
        
        <div class="customer-count">İndiyə kimi müştəri sayımız<br>50.000+</div>

        <div class="address-section">
            <div class="address-text">
                📍 <strong>Sumqayıt şəhəri</strong><br>
                Mərkəzi poçt ilə üzbəüz, gimnaziyanın yanı
            </div>
            <a href="https://maps.app.goo.gl/96uQp2zX1N8t9R8v7" target="_blank" class="maps-btn">
                🗺️ Google Maps-də Aç
            </a>
        </div>
    </div>

    <a href="https://www.tiktok.com/@darkqorxuevi" target="_blank" id="tiktokLiveBadge" class="tiktok-live-badge">
        <div class="tiktok-dot" id="tiktokDot"></div>
        <span id="tiktokText">Canlıda deyilik</span>
    </a>

    <script>
        // ... (Bütün skriptlərin olduğu kimi qalır) ...
        
        // TikTok Status Yeniləməsi
        const isLiveOnTikTok = localStorage.getItem('tiktokLiveStatus') === 'true';
        const tiktokBadge = document.getElementById('tiktokLiveBadge');
        const tiktokTextElement = document.getElementById('tiktokText');

        if (isLiveOnTikTok) {
            tiktokBadge.classList.add('live-active');
            tiktokBadge.href = "https://www.tiktok.com/@darkqorxuevi/live";
            tiktokTextElement.innerText = "Canlıdayıq!";
        } else {
            tiktokBadge.classList.remove('live-active');
            tiktokBadge.href = "https://www.tiktok.com/@darkqorxuevi";
            tiktokTextElement.innerText = "Canlıda deyilik";
        }
        
        // ... (Qalan skriptlər) ...
    </script>
</body>
</html>
