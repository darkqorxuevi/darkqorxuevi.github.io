<script>
function toggleMenu(){
    const menu = document.getElementById("menu");
    const burger = document.getElementById("burger");

    menu.classList.toggle("active");

    if(menu.classList.contains("active")){
        burger.innerHTML = "✕";
        burger.classList.add("close");
    } else {
        burger.innerHTML = "☰";
        burger.classList.remove("close");
    }
}

/* Scroll edəndə bağlansın */
window.addEventListener("scroll", function(){
    const menu = document.getElementById("menu");
    const burger = document.getElementById("burger");

    if(menu.classList.contains("active")){
        menu.classList.remove("active");
        burger.innerHTML = "☰";
        burger.classList.remove("close");
    }
});
</script>

<script>

function openReserve(){
document.getElementById("reservePopup").style.display="flex";

function closeReserve(){
document.getElementById("reservePopup").style.display="none";
}

function sendReserve(){

let date=document.getElementById("date").value;
let time=document.getElementById("time").value;

let slot=date+"-"+time;

let reserved=JSON.parse(localStorage.getItem("reservedSlots")) || [];

if(reserved.includes(slot)){
alert("Bu saat əvvəlcədən rezerv olunub");
return;
}

reserved.push(slot);
localStorage.setItem("reservedSlots",JSON.stringify(reserved));

let message=`Salam, mən ${date}, saat ${time} rezerv etmək istəyirəm`;

let url=`https://wa.me/994993121709?text=${encodeURIComponent(message)}`;

window.open(url,"_blank");

}


</script>

<script>
    const audio = document.getElementById("bgMusic");
const musicIcon = document.getElementById("musicIcon");
audio.volume = 0.2; // Səs səviyyəsi (0.2 çox bərk deyil, ideal dərəcədir)

// Səhifə açılan kimi işə düşən məntiq
window.addEventListener("load", () => {
    const savedTime = localStorage.getItem("musicTime");
    const isPlaying = localStorage.getItem("musicPlaying") === "true";

    if (savedTime) {
        audio.currentTime = parseFloat(savedTime);
    }

    if (isPlaying) {
        // Brauzerin "Autoplay" blokuna qarşı döngü: İlk klikdə musiqi başlayacaq
        let playAttempt = setInterval(() => {
            audio.play().then(() => {
                clearInterval(playAttempt);
                musicIcon.innerText = "🔊";
            }).catch(e => console.log("Musiqi üçün klik gözlənilir..."));
        }, 1000);
    }
});

// Musiqinin saniyəsini hər an yadda saxlayır
audio.addEventListener("timeupdate", () => {
    localStorage.setItem("musicTime", audio.currentTime);
});

// Düyməyə basanda yandırıb-söndürmək
function toggleMusic() {
    if (audio.paused) {
        audio.play();
        musicIcon.innerText = "🔊";
        localStorage.setItem("musicPlaying", "true");
    } else {
        audio.pause();
        musicIcon.innerText = "🔇";
        localStorage.setItem("musicPlaying", "false");
    }
}
function openAdminPopup() {
    document.getElementById("adminPopup").style.display = "flex";
}

function closeAdminPopup() {
    document.getElementById("adminPopup").style.display = "none";
    document.getElementById("errorMsg").style.display = "none";
}

function checkAdminPassword() {
    var pass = document.getElementById("adminPass").value;
    // Sənin istədiyin şifrə
    if (pass === "admindark1903") {
        window.location.href = "admin.html";
    } else {
        document.getElementById("errorMsg").style.display = "block";
    }
}

// "Enter" düyməsi ilə daxil olmaq üçün
document.getElementById("adminPass").addEventListener("keyup", function(event) {
    if (event.key === "Enter") {
        checkAdminPassword();
    }
});
