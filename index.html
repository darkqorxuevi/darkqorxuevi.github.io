<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Qorxu Evi</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: url("forest.jpg") no-repeat center center/cover;
    height: 100vh;
    font-family: Arial, sans-serif;
    color: white;
}

/* Qaraltma layer */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    top: 0;
    left: 0;
    z-index: 0;
}

/* NAVBAR */
nav {
    position: fixed;
    width: 100%;
    padding: 20px;
    display: flex;
    justify-content: center;
    gap: 40px;
    z-index: 2;
}

nav a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    transition: 0.3s;
}

nav a:hover {
    color: red;
}

/* CENTER CONTENT */
.center {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* LOGO */
.center img {
    width: 80%;
    max-width: 500px;
}

/* TEXT */
.tagline {
    margin-top: 20px;
    font-size: 20px;
    letter-spacing: 2px;
    opacity: 0.8;
}

/* BUTTON */
.button {
    margin-top: 30px;
}

.button a {
    background: red;
    padding: 15px 40px;
    text-decoration: none;
    color: white;
    border-radius: 30px;
    font-size: 18px;
    box-shadow: 0 0 20px red;
    transition: 0.3s;
}

.button a:hover {
    background: darkred;
    box-shadow: 0 0 40px red;
}
</style>
</head>
<body>

<nav>
    <a href="#">Ana Səhifə</a>
    <a href="#">Haqqımızda</a>
    <a href="#">Whatsap Qurupu</a>
    <a href="#">Qiymətlər</a>
    <a href="#">Məkan</a>
</nav>

<div class="center">
    <img src="logo.png" alt="Logo">

    <div class="tagline">
        Qorxunun Ən Dərin Nöqtəsinə Hazırsan?
    </div>

    <div class="button">
        <a href="https://wa.me/994XXXXXXXXX" target="_blank">
            Rezervasiya
        </a>
    </div>
</div>

</body>
</html>
