<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Qorxu Evi</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: url("forest.jpg") no-repeat center center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* Qaraltma effekti */
body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
    top: 0;
    left: 0;
}

.logo {
    position: relative;
    z-index: 2;
    text-align: center;
}

.logo img {
    width: 80%;
    max-width: 500px;
}

.button {
    margin-top: 30px;
}

.button a {
    background: red;
    color: white;
    padding: 15px 35px;
    text-decoration: none;
    font-size: 18px;
    border-radius: 30px;
    box-shadow: 0 0 20px red;
    transition: 0.3s;
}

.button a:hover {
    background: darkred;
    box-shadow: 0 0 40px red;
}
</style>

</head>
<body>

<div class="logo">
    <img src="logo.png" alt="Dark Qorxu Evi Logo">

    <div class="button">
        <a href="https://wa.me/994993121709" target="_blank">
            Rezervasiya
        </a>
    </div>
</div>

</body>
</html>
