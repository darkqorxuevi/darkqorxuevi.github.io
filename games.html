<!DOCTYPE html>
<html lang="az">
<head>
<link rel="icon" type="image/png" href="logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyunlar</title>
<link rel="stylesheet" href="style.css">

<style>
/* Orijinal CSS-in saxlanılır */
.games-container{
display:flex;
justify-content:center;
gap:40px;
margin-top:60px;
flex-wrap:wrap;
}

.game-card{
width:220px;
height:220px;
background:#111;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
text-align:center;
}

.game-card:hover{
transform:scale(1.05);
box-shadow:0 0 15px rgba(255,0,0,0.5);
}

.game-card img{
width:100%;
height:160px;
object-fit:cover;
}

.game-title {
color:white;
margin-top:8px;
font-size: 18px;
font-weight: bold;
}

/* --- YENİ POPUP VƏ KÖHNƏ DƏFTƏR TEMASI --- */

.popup-bg {
display: none;
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background: rgba(0, 0, 0, 0.9);
z-index: 1000;
justify-content: center;
align-items: center;
opacity: 0;
transition: opacity 0.4s ease;
}

.popup-bg.active {
display: flex;
opacity: 1;
}

.popup-box {
background: #f4e4bc; /* Köhnə kağız rəngi */
background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png'); /* Kağız teksturası */
border: 10px double #5d4037;
border-radius: 5px;
padding: 40px;
max-width: 600px;
width: 85%;
position: relative;
box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 50px rgba(93, 64, 55, 0.2);
transform: scale(0.7);
transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.popup-bg.active .popup-box {
transform: scale(1);
}

.close-btn {
position: absolute;
top: 10px; right: 20px;
color: #5d4037;
font-size: 35px;
font-weight: bold;
cursor: pointer;
}

.story-box {
color: #2b1d0e; /* Köhnə mürəkkəb rəngi */
font-family: 'Courier New', Courier, monospace; /* Yazı makinası şrifti */
font-size: 19px;
font-weight: bold;
line-height: 1.6;
text-align: left;
min-height: 100px;
}

/* Yazı makinası kursoru effekti */
.story-box::after {
content: "|";
animation: blink 0.7s infinite;
}

@keyframes blink {
0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; }
}
</style>

</head>
<body>

<div class="side-menu" id="menu">
<a href="index.html">Ana Səhifə</a>
<a href="about.html">Haqqımızda</a>
<a href="location.html">Məkan</a>
<a href="rejimler.html">Rejimlər</a>
</div>

<div class="topbar">
<div class="topbar-title">OYUNLAR</div>
<div class="burger" onclick="toggleMenu()" id="burger">☰</div>
</div>

<section class="games-container">
    <div class="game-card" onclick="openPopup('murad')">
        <img src="murad.jpg" class="game-img">
        <div class="game-title">Murad</div>
    </div>

    <div class="game-card" onclick="openPopup('ezrail')">
        <img src="ezrail.jpg" class="game-img">
        <div class="game-title">Əzrayil</div>
    </div>

    <div class="game-card" onclick="openPopup('qaranliq')">
        <img src="qaranliq.jpg" class="game-img">
        <div class="game-title">Qaranlıq</div>
    </div>
</section>

<div id="storyPopup" class="popup-bg" onclick="closePopupExternal(event)">
    <div class="popup-box">
        <span class="close-btn" onclick="closePopup()">×</span>
        <div id="storyBox" class="story-box"></div>
    </div>
</div>

<script>
function toggleMenu(){
    const menu = document.getElementById("menu");
    const burger = document.getElementById("burger");
    menu.classList.toggle("active");
    burger.innerHTML = menu.classList.contains("active") ? "✕" : "☰";
}

let typeIndex = 0;
let currentText = "";
let typingTimer;

function typeWriter(text) {
    if (typeIndex < text.length) {
        document.getElementById("storyBox").innerHTML += text.charAt(typeIndex);
        typeIndex++;
        typingTimer = setTimeout(() => typeWriter(text), 40); // Yazı sürəti (40ms)
    }
}

function openPopup(game){
    const popup = document.getElementById("storyPopup");
    const box = document.getElementById("storyBox");
    
    let story = "";
    if(game === "murad") {
        story = "Muradın 10 yaşı var idi. 10 il əvvəl onun anasına cin musallat oldu. Ailəsi amansızcasına öldürüldü. İfrit onun ruhuna aşiq olub onu bu evdə həbs etdi. Muradın ruhunu xilas edə biləcəksən?";
    } else if(game === "ezrail") {
        story = "Bura qışqırmaq üçün deyil, susmaq və etiraf etmək üçündür. Əzrayil sənin nə dediyini yox, nəyi gizlətdiyini bilir. Əgər günahını etiraf etməsən, o gecə Şeytan da orada olacaq...";
    } else if(game === "qaranliq") {
        story = "Bu ev bir vaxtlar sadə bir zirzəmi deyildi…
Bura “işıqdan qaçanların” sığınacağı idi.

İllər əvvəl burada çalışan bir elektrik mühəndisi var idi — Rauf. O, qaranlıqdan qorxmurdu… əksinə, qaranlığı sevdiyini deyirdi. Gecələr tək qalır, bütün işıqları söndürüb saatlarla bu padvalda otururdu. Deyirdi ki:

“Qaranlıq boş deyil… sadəcə biz görə bilmirik.”

Bir gecə o, bütün işıq sistemini dəyişdi. Evin içində elə bir sistem qurdu ki, işıq istənilən anda sönə bilərdi. O gündən sonra hər şey dəyişdi.

⸻

İlk Hadisə

Rauf yoxa çıxdı.

Onu son dəfə görən təmizləyici qadın — Lalə dedi ki, Rauf qaranlıqda kimsə ilə danışırdı. Amma orada başqa heç kim yox idi.

Lalə yalnız bir cümlə eşitmişdi:

“Onlar gəldi… işığı söndür.”

⸻

Qaranlıq Məxluqlar

Bu evdə bir qayda var:

İşıq varsa — sən varsansa.
İşıq yoxdursa — onlar var.

“Qaranlıq məxluqlar” adlandırılan varlıqlar insan deyil. Onlar görünmür… amma hiss olunur.
	•	Nəfəsini ensəndə hiss edəcəksən
	•	Addımlarını sənin addımınla uyğunlaşdıracaqlar
	•	Səni çağıracaqlar… tanıdığın səslə

Ən qorxulusu isə budur:

Onlar səni görə bilməz… amma sən onları hiss etdikcə güclənirlər.";
    }

    // Təmizləmə və Başlatma
    box.innerHTML = "";
    typeIndex = 0;
    clearTimeout(typingTimer);
    
    popup.style.display = "flex";
    setTimeout(() => popup.classList.add("active"), 10);
    
    // Animasiyadan bir az sonra yazmağa başla
    setTimeout(() => typeWriter(story), 500);
}

function closePopup(){
    const popup = document.getElementById("storyPopup");
    popup.classList.remove("active");
    setTimeout(() => {
        popup.style.display = "none";
        document.getElementById("storyBox").innerHTML = "";
    }, 400);
}

// Boş yerə basanda bağlanması üçün
function closePopupExternal(event) {
    if (event.target.id === "storyPopup") closePopup();
}
</script>

</body>
</html>
