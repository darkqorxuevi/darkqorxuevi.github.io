<!DOCTYPE html>
<html lang="az">
<head>
<link rel="icon" type="image/png" href="logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Rezervasiya</title>
<link rel="stylesheet" href="style.css">
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZWnxyN5UWXJbcWBClQBuCHZ_m2nCJtdwvZ9VW7G3MinCnQDSYMf5wKINFxJvfjVN7/exec";
</script>
<style>
    /* DOLU SAATIN GÖRÜNÜŞÜ */
    .disabled-time {
        background-color: #333 !important; 
        color: #777 !important;
        opacity: 0.5;
        cursor: not-allowed !important;
        pointer-events: none !important;
        position: relative;
        border: 1px solid #444 !important;
    }
    .disabled-time::after {
        content: "DOLU";
        font-size: 10px;
        position: absolute;
        bottom: 3px;
        left: 50%;
        transform: translateX(-50%);
        color: #ff4d4d;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="topbar">
    <div class="back-btn" onclick="goBack()">←</div>
    <div class="topbar-title">Online Rezervasiya</div>
</div>

<div class="reserve-page">
    <select id="dateSelect"></select>
    <div class="time-grid" id="timeGrid">Yüklənir...</div>
</div>

<div class="popup" id="popup">
    <div class="popup-box">
        <h3 id="chosenTime"></h3>
        <input type="text" id="name" placeholder="Ad Soyad">
        <input type="tel" id="phone" placeholder="Telefon">
        <input type="number" id="people" placeholder="Neçə nəfər (istəyə bağlı)">
        
        <select id="gameSelect" style="width:100%; padding:10px; margin-top:10px; background:#111; color:white; border:1px solid #444;">
            <option value="Seçilməyib">Oyun seçin (Məcburi deyil)</option>
            <option value="Murad">Murad</option>
            <option value="Əzrayıl">Əzrayıl</option>
            <option value="Qaranlıq">Qaranlıq</option>
            <option value="Qaranlıq">Cin'ne Süfyan</option>
        </select>

        <button id="reserveBtn" disabled style="margin-top:20px;">Rezerv et</button>
        <button onclick="closePopup()">Geri dön</button>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

    window.goBack = () => window.location.href="index.html";

    let dateSelect = document.getElementById("dateSelect");
    let grid = document.getElementById("timeGrid");
    let nameInput = document.getElementById("name");
    let phoneInput = document.getElementById("phone");
    let gameSelect = document.getElementById("gameSelect");
    let reserveBtn = document.getElementById("reserveBtn");
    let selectedTime = "";

    // 4 GÜNLÜK TARİX SİYAHISI
    let today = new Date();
    for(let i=0; i<4; i++){
        let d = new Date();
        d.setDate(today.getDate()+i);
        let option = document.createElement("option");
        option.value = d.toISOString().split('T')[0];
        option.innerText = d.toLocaleDateString("az-AZ", { day:"numeric", month:"long" });
        dateSelect.appendChild(option);
    }

    const times = ["00:00","01:00","02:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00","21:00","22:00","23:00"];

    async function loadStatus() {
        grid.innerHTML = "<div style='grid-column: 1/-1; text-align:center;'>Yüklənir...</div>";
        try {
            let response = await fetch(SCRIPT_URL);
            let reservedSlots = await response.json();
            renderGrid(reservedSlots);
        } catch (error) {
            renderGrid([]);
        }
    }

    function renderGrid(reservedSlots) {
        grid.innerHTML = "";
        let selectedDate = dateSelect.value;
        times.forEach(time => {
            let div = document.createElement("div");
            div.className = "time-box";
            div.innerText = time;
            let slotKey = selectedDate + "_" + time;
            if (reservedSlots.includes(slotKey)) {
                div.classList.add("disabled-time");
            } else {
                div.addEventListener("click", () => {
                    selectedTime = time;
                    document.getElementById("popup").style.display="flex";
                    document.getElementById("chosenTime").innerText="Saat: " + time;
                });
            }
            grid.appendChild(div);
        });
    }

    dateSelect.addEventListener("change", loadStatus);
    loadStatus();

    function checkInputs(){
        reserveBtn.disabled = !(nameInput.value.trim() && phoneInput.value.trim());
    }
    nameInput.addEventListener("input", checkInputs);
    phoneInput.addEventListener("input", checkInputs);

    window.closePopup = () => document.getElementById("popup").style.display="none";

    reserveBtn.addEventListener("click", async function(){
        let data = {
            slotKey: dateSelect.value + "_" + selectedTime,
            name: nameInput.value,
            phone: phoneInput.value,
            people: document.getElementById("people").value || "Qeyd edilməyib",
            game: gameSelect.value, 
            dateText: dateSelect.options[dateSelect.selectedIndex].text,
            time: selectedTime
        };

        reserveBtn.innerText = "Göndərilir...";
        reserveBtn.disabled = true;

        try {
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });

            let msg = `🆕 Rezervasiya!\n👤: ${data.name}\n📞: ${data.phone}\n🎮 Oyun: ${data.game}\n👥: ${data.people}\n📅: ${data.dateText}\n⏰: ${data.time}`;
            
            await fetch(`https://api.telegram.org/bot8514260890:AAHatHZ8DIqInbJ3LkiBSv5hvjk971fLYvQ/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: "7766487634", text: msg })
            });

            alert("Rezervasiya tamamlandı! ✅");
            closePopup();
            loadStatus();
        } catch (e) {
            alert("Xəta baş verdi ❌");
        } finally {
            reserveBtn.innerText = "Rezerv et";
            nameInput.value = "";
            phoneInput.value = "";
        }
    });
});
</script>
</body>
</html>
