<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Rezervasiya</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
    <div class="back-btn" onclick="goBack()">←</div>
    <div class="topbar-title">Online Rezervasiya</div>
</div>

<div class="reserve-page">
    <select id="dateSelect"></select>
    <div class="time-grid" id="timeGrid"></div>
</div>

<div class="popup" id="popup">
<div class="popup-box">

<div class="popup-back" onclick="closePopup()">←</div>

<h3 id="chosenTime"></h3>

<input type="text" id="name" placeholder="Ad Soyad">
<input type="tel" id="phone" placeholder="Telefon">
<input type="number" id="people" placeholder="Neçə nəfər (istəyə bağlı)">

<button id="reserveBtn" disabled>Rezerv et</button>
<button onclick="closePopup()">Geri dön</button>

</div>
</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

/* BACK */
window.goBack = function(){
    window.location.href="index.html";
}

/* TARIX */
let dateSelect = document.getElementById("dateSelect");
let today = new Date();

for(let i=0;i<4;i++){
    let d = new Date();
    d.setDate(today.getDate()+i);

    let option = document.createElement("option");
    option.value = d.toISOString().split('T')[0];
    option.innerText = d.toLocaleDateString("az-AZ", {
        day:"numeric",
        month:"long"
    });

    dateSelect.appendChild(option);
}

/* SAATLAR */
let times = ["11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00","21:00","22:00","23:00","00:00","01:00","02:00"];
let grid = document.getElementById("timeGrid");

let selectedTime = "";

times.forEach(function(time){

    let div = document.createElement("div");
    div.className = "time-box";
    div.innerText = time;

    div.addEventListener("click", function(){
        selectedTime = time;
        openPopup(time);
    });

    grid.appendChild(div);

});

/* POPUP */
function openPopup(time){
    document.getElementById("popup").style.display="flex";
    document.getElementById("chosenTime").innerText="Saat: " + time;
}

window.closePopup = function(){
    document.getElementById("popup").style.display="none";
}

/* INPUTLAR */
let nameInput = document.getElementById("name");
let phoneInput = document.getElementById("phone");
let reserveBtn = document.getElementById("reserveBtn");

function checkInputs(){
    if(nameInput.value.trim() !== "" && phoneInput.value.trim() !== ""){
        reserveBtn.disabled = false;
    }else{
        reserveBtn.disabled = true;
    }
}

nameInput.addEventListener("input", checkInputs);
phoneInput.addEventListener("input", checkInputs);

/* 🔥 TELEGRAM GÖNDƏN BUTTON */
reserveBtn.addEventListener("click", async function(){

    // Məlumatları toplayırıq
    let name = nameInput.value;
    let phone = phoneInput.value;
    let people = document.getElementById("people").value || "Qeyd edilməyib";
    let date = dateSelect.options[dateSelect.selectedIndex].text; // Tarixin adını götürürük
    let time = selectedTime;

    // Telegramda görünəcək mesajın formati
    let message = `🚨 Yeni Rezervasiya! 🚨\n\n👤 Ad Soyad: ${name}\n📞 Telefon: ${phone}\n👥 Neçə nəfər: ${people}\n📅 Tarix: ${date}\n⏰ Saat: ${time}`;

    // Sənin token və ID-n
    let token = "8514260890:AAHatHZ8DIqInbJ3LkiBSv5hvjk971fLYvQ";
    let chatId = "7766487634";
    let url = `https://api.telegram.org/bot${token}/sendMessage`;

    try{
        let response = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                chat_id: chatId,
                text: message
            })
        });

        if(response.ok) {
            alert("Rezervasiya uğurla tamamlandı ✅");
            
            // Popup-ı bağla və inputları təmizlə
            closePopup();
            nameInput.value = "";
            phoneInput.value = "";
            document.getElementById("people").value = "";
            checkInputs(); // Butonu yenidən deaktiv et
        } else {
            alert("Xəta baş verdi ❌ (Telegrama göndərilə bilmədi)");
        }

    }catch(error){
        alert("Xəta baş verdi ❌ (İnternet bağlantınızı yoxlayın)");
    }

});

});

</script>

</body>
</html>
