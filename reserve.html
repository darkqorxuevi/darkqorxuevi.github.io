<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Rezervasiya</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
    <div class="back-btn" onclick="goBack()">←</div>
    <div class="topbar-title">Online Rezervasiya</div>
</div>

<div class="reserve-page">

    <!-- TARİX -->
    <h2 id="selectedDate"></h2>

    <!-- SAATLAR -->
    <div class="time-grid" id="timeGrid"></div>

</div>

<script>
const times = ["14:00","15:00","16:00","17:00","18:00","19:00","20:00","21:00","22:00","23:00"];

let selectedTime = "";
let selectedDate = "";

function goBack(){
    window.location.href = "index.html";
}

// BUGÜN + 5 GÜN
function generateDates(){
    let today = new Date();
    selectedDate = today.toISOString().split('T')[0];

    document.getElementById("selectedDate").innerText =
        formatDate(today);

    generateTimes();
}

// TARİX FORMAT
function formatDate(date){
    return date.toLocaleDateString("az-AZ", {
        day: "numeric",
        month: "long",
        weekday: "long"
    });
}

// SAATLAR
function generateTimes(){
    let grid = document.getElementById("timeGrid");
    grid.innerHTML = "";

    times.forEach(time=>{
        let div = document.createElement("div");
        div.className = "time-box";
        div.innerText = time;

        div.onclick = () => selectTime(div, time);

        grid.appendChild(div);
    });
}

// SEÇİM
function selectTime(el, time){
    document.querySelectorAll(".time-box").forEach(b=>b.classList.remove("active"));
    el.classList.add("active");
    selectedTime = time;

    showConfirm();
}

// CONFIRM POPUP
function showConfirm(){
    let confirm = confirm("Rezerv etmək istəyirsən?\nSaat: " + selectedTime);

    if(confirm){
        openForm();
    }
}

// FORM
function openForm(){
    let ad = prompt("Ad Soyad:");
    let tel = prompt("Telefon nömrə:");

    if(!ad || !tel){
        alert("Ad və nömrə vacibdir!");
        return;
    }

    alert("Rezervasiya uğurla tamamlandı ✅");
}

generateDates();
</script>

</body>
</html>
