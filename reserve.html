<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Rezervasiya</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="back-btn" onclick="goBack()">←</div>
    <div class="topbar-title">Online Rezervasiya</div>
</div>

<div class="reserve-page">

    <!-- TARİX SELECT -->
    <select id="dateSelect"></select>

    <!-- SAATLAR -->
    <div class="time-grid" id="timeGrid"></div>

</div>

<!-- POPUP FORM -->
<div class="popup" id="popup">

<div class="popup-box">

<h3 id="chosenTime"></h3>

<input type="text" id="name" placeholder="Ad Soyad">
<input type="tel" id="phone" placeholder="Telefon">
<input type="number" id="people" placeholder="Neçə nəfər (istəyə bağlı)">

<button id="reserveBtn" disabled>Rezerv et</button>
<button onclick="closePopup()">Geri dön</button>

</div>
</div>

<script>

function goBack(){
    window.location.href="index.html";
}

/* ===== TARİX (3 GÜN LIMİT) ===== */
let dateSelect = document.getElementById("dateSelect");

function generateDates(){
    let today = new Date();

    for(let i=0;i<4;i++){
        let d = new Date();
        d.setDate(today.getDate()+i);

        let option = document.createElement("option");

        option.value = d.toISOString().split('T')[0];
        option.innerText = d.toLocaleDateString("az-AZ", {
            day:"numeric",
            month:"long"
        });

        dateSelect.appendChild(option);
    }
}

generateDates();

/* ===== SAATLAR ===== */
const times = ["14:00","15:00","16:00","17:00","18:00","19:00","20:00","21:00","22:00","23:00"];

let selectedTime="";

let grid=document.getElementById("timeGrid");

times.forEach(time=>{
    let div=document.createElement("div");
    div.className="time-box";
    div.innerText=time;

    div.onclick=()=>{
        selectedTime=time;
        openPopup(time);
    };

    grid.appendChild(div);
});

/* ===== POPUP ===== */

function openPopup(time){
    document.getElementById("popup").style.display="flex";
    document.getElementById("chosenTime").innerText="Saat: "+time;
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

/* ===== VALIDATION ===== */

let nameInput=document.getElementById("name");
let phoneInput=document.getElementById("phone");
let reserveBtn=document.getElementById("reserveBtn");

[nameInput, phoneInput].forEach(input=>{
    input.addEventListener("input", ()=>{
        if(nameInput.value.trim() && phoneInput.value.trim()){
            reserveBtn.disabled=false;
        }else{
            reserveBtn.disabled=true;
        }
    });
});

/* ===== RESERVE CLICK ===== */

reserveBtn.onclick=function(){

    let date=dateSelect.value;
    let name=nameInput.value;
    let phone=phoneInput.value;
    let people=document.getElementById("people").value;

    alert("Rezervasiya uğurla tamamlandı ✅");

    closePopup();
}

</script>

</body>
</html>
