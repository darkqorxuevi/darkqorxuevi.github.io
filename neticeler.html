<!DOCTYPE html>
<html lang="az">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nəticələr - DARK Horror House</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Səhifəyə özəl əlavə stillər */
        body {
            background-color: #000;
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* Sağ yuxarıdakı Ana Səhifə butonu */
        .home-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #ff0000;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            transition: 0.3s;
            font-size: 14px;
            z-index: 1000;
        }

        .home-btn:hover {
            background: #b30000;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
        }

        /* Mərkəzdəki blok */
        .container {
            padding: 20px;
            border: 2px solid #ff0000;
            background: rgba(20, 20, 20, 0.9);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
            max-width: 90%;
        }

        .status-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
            animation: pulse 2s infinite;
        }

        h1 {
            color: #ff0000;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        p {
            font-size: 18px;
            color: #ccc;
            line-height: 1.6;
        }

        /* Animasiya */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Arxa fonda qan ləkəsi effekti üçün xırda detal */
        .bg-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(50,0,0,0.2) 0%, rgba(0,0,0,1) 80%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-effect"></div>

    <a href="index.html" class="home-btn">← Ana Səhifə</a>

    <div class="container">
        <span class="status-icon">🏆</span>
        <h1>Nəticələr tezliklə açıqlanacaq!</h1>
        <p>Yarışma davam edir. Bütün komandaların nəticələri emal olunduqdan sonra burada elan ediləcək.</p>
        <p style="font-size: 14px; color: #666; margin-top: 20px;">Bizi izləməyə davam edin...</p>
    </div>

</body>
</html>
