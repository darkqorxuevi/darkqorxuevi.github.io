<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK | REAL-TIME CONTROL</title>
    <style>
        :root { --red: #ff0000; --dark-bg: #050505; --card-bg: #0d0d0d; --text: #ffffff; --gray: #888; }
        body { background-color: var(--dark-bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Giriş Ekranları */
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 10000; transition: 0.5s; }
        .login-box { width: 90%; max-width: 400px; padding: 40px; background: var(--card-bg); border: 1px solid var(--red); border-radius: 20px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; color: #fff; border: 1px solid #333; border-radius: 10px; box-sizing: border-box; }
        button { cursor: pointer; transition: 0.3s; }
        .btn-home { width: 100%; padding: 12px; background: #222; color: #aaa; border: 1px solid #444; border-radius: 10px; margin-top: 10px; font-weight: bold; }
        .btn-home:hover { background: #333; color: white; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--card-bg); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 20px; z-index: 999; }
        .menu-btn { background: transparent; color: var(--text); border: none; padding: 15px; text-align: left; border-radius: 10px; margin-bottom: 5px; }
        .menu-btn.active { background: rgba(255, 0, 0, 0.1); color: var(--red); font-weight: bold; }

        /* Content */
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* Stats & Tables */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .val { font-size: 32px; font-weight: bold; color: var(--red); display: block; margin: 10px 0; }
        
        .log-table { width: 100%; border-collapse: collapse; background: #0a0a0a; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .log-table th, .log-table td { padding: 12px; text-align: left; border-bottom: 1px solid #111; font-size: 13px; }
        .log-table th { color: var(--red); background: #111; }

        .live-status { display: inline-flex; align-items: center; gap: 8px; font-weight: bold; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #555; }
        .live .dot { background: #00ff00; box-shadow: 0 0 10px #00ff00; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        @media (max-width: 900px) {
            .sidebar { position: fixed; left: -300px; height: 100%; transition: 0.3s; }
            .sidebar.open { left: 0; }
            .content { padding: 80px 20px; }
        }
    </style>
</head>
<body>

    <!-- Giriş Mərhələsi 1 -->
    <div id="loginOverlay" class="overlay-screen">
        <div class="login-box">
            <h2 style="color:var(--red)">DARK LOGIN</h2>
            <input type="text" id="userInput" placeholder="Admin Adı">
            <input type="password" id="passInput" placeholder="Şifrə">
            <button onclick="checkStep1()" style="width:100%; padding:15px; background:var(--red); color:white; border:none; border-radius:10px; font-weight:bold;">DAXİL OL</button>
            <button class="btn-home" onclick="window.location.href='index.html'">🏠 Ana Səhifəyə Qayıt</button>
        </div>
    </div>

    <!-- Giriş Mərhələsi 2 -->
    <div id="twoFAOverlay" class="overlay-screen" style="display:none;">
        <div class="login-box">
            <h2 style="color:var(--red)">SECURITY</h2>
            <input type="password" id="twoFAPass" placeholder="Gizlilik Acharı">
            <button onclick="checkStep2()" style="width:100%; padding:15px; background:var(--red); color:white; border:none; border-radius:10px; font-weight:bold;">PANELİ AÇ</button>
            <button class="btn-home" onclick="window.location.href='index.html'">🏠 Ana Səhifəyə Qayıt</button>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <h2 style="color:var(--red); text-align:center">DARK PANEL</h2>
        <button class="menu-btn active" onclick="showPage('dashboard', this)">📊 DASHBOARD</button>
        <button class="menu-btn" onclick="showPage('blacklist', this)">🚫 BLACKLIST</button>
        <button class="menu-btn" onclick="showPage('logs', this)">🛠 SİSTEM LOQLARI</button>
        <button onclick="window.location.href='index.html'" style="margin-top:auto; padding:15px; background:#333; border:1px solid #555; border-radius:10px; color:white; font-weight:bold;">🏠 ANA SƏHİFƏ</button>
    </div>

    <div class="content">
        <!-- Dashboard -->
        <div id="dashboard" class="page active">
            <h3>CANLI STATİSTİKA</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <h4>TikTok Canlı</h4>
                    <div id="tiktokStatus" class="live-status"><div class="dot"></div> <span id="statusText">OFFLINE</span></div>
                    <div style="margin-top:10px;">
                        <button onclick="toggleTikTok(true)" style="background:green; color:white; border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">AKTİV ET</button>
                        <button onclick="toggleTikTok(false)" style="background:#880000; color:white; border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">DEAKTİV ET</button>
                    </div>
                </div>
                <div class="stat-card"><h4>Ümumi Ziyarət</h4><span class="val" id="totalVisits">0</span></div>
                <div class="stat-card"><h4>Real Rezervlər</h4><span class="val" id="totalRezervs">0</span></div>
            </div>
        </div>

        <!-- Blacklist -->
        <div id="blacklist" class="page">
            <h3>🚫 IP BAN SİSTEMİ</h3>
            <div style="background:#0a0a0a; padding:20px; border-radius:15px; border:1px solid #222;">
                <input type="text" id="banIP" placeholder="Bloklanacaq IP">
                <button onclick="addBan()" style="width:100%; padding:15px; background:var(--red); color:white; border:none; border-radius:10px; font-weight:bold;">IP-Nİ BLOKLA</button>
            </div>
            <div id="bannedList" style="margin-top:20px; color:red; font-family:monospace;"></div>
        </div>

        <!-- Logs -->
        <div id="logs" class="page">
            <h3>🛠 REAL LOQLAR</h3>
            <button onclick="clearLogs()" style="background:#444; color:white; border:none; padding:10px; border-radius:5px; margin-bottom:10px;">Loqları Təmizlə</button>
            
            <h4>Ziyarətçilər</h4>
            <table class="log-table">
                <thead><tr><th>IP</th><th>Tarix</th></tr></thead>
                <tbody id="visitLogs"></tbody>
            </table>

            <h4>Rezervasiyalar</h4>
            <table class="log-table">
                <thead><tr><th>IP</th><th>Məlumat</th><th>Tarix</th></tr></thead>
                <tbody id="rezervLogs"></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- REAL MƏLUMATLARIN İDARƏ EDİLMƏSİ ---
        let storage = {
            visits: JSON.parse(localStorage.getItem('dark_visits')) || [],
            rezervs: JSON.parse(localStorage.getItem('dark_rezervs')) || [],
            bans: JSON.parse(localStorage.getItem('dark_bans')) || [],
            isLive: localStorage.getItem('tiktokLiveStatus') === 'true' // Ana səhifə ilə əlaqə
        };

        function checkStep1() {
            if(document.getElementById("userInput").value === "dark" && document.getElementById("passInput").value === "dark123") {
                document.getElementById("loginOverlay").style.display = "none";
                document.getElementById("twoFAOverlay").style.display = "flex";
            } else { alert("Yanlış məlumat!"); }
        }

        function checkStep2() {
            if(document.getElementById("twoFAPass").value === "dark170109") {
                document.getElementById("twoFAOverlay").style.display = "none";
                initPanel();
            } else { alert("Açar yanlışdır!"); }
        }

        function initPanel() {
            updateStats(); renderBans(); renderLogs();
            toggleTikTok(storage.isLive);
        }

        function updateStats() {
            document.getElementById("totalVisits").innerText = storage.visits.length;
            document.getElementById("totalRezervs").innerText = storage.rezervs.length;
        }

        // --- ƏSAS HİSSƏ: TİKTOK STATUSUNUN DƏYİŞDİRİLMƏSİ ---
        function toggleTikTok(status) {
            storage.isLive = status;
            // Ana səhifənin görəcəyi kodu (tiktokLiveStatus) yeniləyirik:
            localStorage.setItem('tiktokLiveStatus', status ? 'true' : 'false'); 
            
            const el = document.getElementById("tiktokStatus");
            if(status) {
                el.classList.add("live");
                document.getElementById("statusText").innerText = "LIVE NOW";
            } else {
                el.classList.remove("live");
                document.getElementById("statusText").innerText = "OFFLINE";
            }
        }

        function addBan() {
            const ip = document.getElementById("banIP").value;
            if(ip && !storage.bans.includes(ip)) {
                storage.bans.push(ip);
                localStorage.setItem('dark_bans', JSON.stringify(storage.bans));
                renderBans(); document.getElementById("banIP").value = "";
            }
        }

        function renderBans() { document.getElementById("bannedList").innerHTML = storage.bans.map(ip => `<div>[BANNED] ${ip}</div>`).join(""); }

        function renderLogs() {
            document.getElementById("visitLogs").innerHTML = storage.visits.map(v => `<tr><td>${v.ip}</td><td>${v.date}</td></tr>`).reverse().join("");
            document.getElementById("rezervLogs").innerHTML = storage.rezervs.map(r => `<tr><td>${r.ip}</td><td>${r.note}</td><td>${r.date}</td></tr>`).reverse().join("");
        }

        function clearLogs() {
            if(confirm("Bütün loqlar silinsin?")) {
                localStorage.setItem('dark_visits', '[]'); localStorage.setItem('dark_rezervs', '[]');
                storage.visits = []; storage.rezervs = [];
                updateStats(); renderLogs();
            }
        }

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.menu-btn').forEach(m => m.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
