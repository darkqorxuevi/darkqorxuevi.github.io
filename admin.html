<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - DARK Horror</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .admin-box {
            background: #222;
            border: 2px solid red;
            border-radius: 10px;
            padding: 30px;
            max-width: 400px;
            margin: 0 auto;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-live { background-color: #00ff00; color: #000; }
        .btn-offline { background-color: #ff0000; color: #fff; }
        .back-btn { background-color: #555; color: white; margin-top: 20px; }
        #status-msg { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>ūüĒ• Admin Panel ūüĒ•</h2>
        <p>TikTok CanlńĪ YayńĪm Statusunu ńįdar…ô Et:</p>
        
        <button class="btn-live" onclick="setLiveStatus('true')">ūüüĘ CanlńĪ YayńĪm AKTńįV (True)</button>
        <button class="btn-offline" onclick="setLiveStatus('false')">ūüĒī CanlńĪ YayńĪm DEAKTńįV (False)</button>
        
        <p id="status-msg"></p>

        <button class="back-btn" onclick="window.location.href='index.html'">Ana S…ôhif…ôy…ô QayńĪt</button>
    </div>

    <script>
        // S…ôhif…ô a√ßńĪlanda m√∂vcud v…ôziyy…ôti g√∂st…ôrm…ôk √ľ√ß√ľn
        window.onload = function() {
            let currentStatus = localStorage.getItem('tiktokLiveStatus');
            if(currentStatus === 'true') {
                document.getElementById('status-msg').innerText = "Cari V…ôziyy…ôt: ūüüĘ CanlńĪdayńĪq";
            } else {
                document.getElementById('status-msg').innerText = "Cari V…ôziyy…ôt: ūüĒī CanlńĪda Deyilik";
            }
        }

        // Butonlara basanda iŇül…ôy…ôn funksiya
        function setLiveStatus(status) {
            localStorage.setItem('tiktokLiveStatus', status);
            
            if(status === 'true') {
                document.getElementById('status-msg').innerText = "Cari V…ôziyy…ôt: ūüüĘ CanlńĪdayńĪq (Yadda saxlanńĪldńĪ)";
                document.getElementById('status-msg').style.color = "#00ff00";
            } else {
                document.getElementById('status-msg').innerText = "Cari V…ôziyy…ôt: ūüĒī CanlńĪda Deyilik (Yadda saxlanńĪldńĪ)";
                document.getElementById('status-msg').style.color = "#ff0000";
            }
        }
    </script>
</body>
</html>
