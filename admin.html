<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - DARK Horror</title>
    <style>
        body { background-color: #111; color: white; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .admin-box { background: #222; border: 2px solid red; border-radius: 10px; padding: 20px; max-width: 500px; margin: 0 auto; }
        button { width: 100%; padding: 12px; margin: 10px 0; font-weight: bold; border-radius: 5px; cursor: pointer; border:none; }
        .btn-live { background: #00ff00; }
        .btn-offline { background: red; color: white; }
        .review-admin-item { background: #000; border: 1px solid #444; padding: 10px; margin-top: 10px; text-align: left; }
        .del-btn { background: darkred; color: white; width: auto; padding: 5px 10px; margin-right: 5px; }
        .like-admin-btn { background: darkgreen; color: white; width: auto; padding: 5px 10px; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>🔥 DARK Admin Panel 🔥</h2>
        
        <div style="border-bottom: 1px solid red; padding-bottom: 20px;">
            <p>TikTok Statusu:</p>
            <button class="btn-live" onclick="setLiveStatus('true')">🟢 Canlı Yayım AKTİV</button>
            <button class="btn-offline" onclick="setLiveStatus('false')">🔴 Canlı Yayım DEAKTİV</button>
        </div>

        <div style="margin-top: 20px;">
            <h3>💬 Rəyləri İdarə Et</h3>
            <div id="adminReviewList">Yüklənir...</div>
        </div>

        <button style="background:#555; color:white; margin-top:20px;" onclick="window.location.href='index.html'">Çıxış</button>
    </div>

    <script>
        const scriptURL = 'BURAYA_KOPYALADIGIN_LINKI_YAPISDIR';

        async function loadAdminReviews() {
            const res = await fetch(`${scriptURL}?action=read`);
            const data = await res.json();
            document.getElementById("adminReviewList").innerHTML = data.map(r => `
                <div class="review-admin-item">
                    <strong>${r.name}</strong>: ${r.text}
                    <div style="margin-top:10px;">
                        <button class="del-btn" onclick="deleteReview('${r.id}')">Sil</button>
                        <button class="like-admin-btn" onclick="adminLike('${r.id}')">Dark Bəyənməsi Ver</button>
                    </div>
                </div>
            `).join('');
        }

        async function deleteReview(id) {
            if(confirm("Bu rəyi silmək istəyirsən?")) {
                await fetch(`${scriptURL}?action=delete&id=${id}`, {mode: 'no-cors'});
                loadAdminReviews();
            }
        }

        async function adminLike(id) {
            await fetch(`${scriptURL}?action=adminLike&id=${id}`, {mode: 'no-cors'});
            alert("Bəyənildi!");
            loadAdminReviews();
        }

        function setLiveStatus(s) { localStorage.setItem('tiktokLiveStatus', s); alert("Status dəyişdi!"); }
        
        window.onload = loadAdminReviews;
    </script>
</body>
</html>
