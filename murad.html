<!DOCTYPE html>
<html lang="az">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Murad Hekayə</title>

<style>

body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:serif;
color:#111;
}

.book{
width:700px;
background:#f4e7c5;
padding:40px;
border-radius:10px;
box-shadow:0 0 40px black;
font-size:20px;
line-height:1.8;
}

</style>

</head>

<body>

<div class="book">
<p id="story"></p>
</div>

<script>

const text = `Muradın 10 yaşı var idi. 
10 il əvvəl onun anasına cin musallat oldu.

Qaranlıq gecədə ailənin bütün üzvləri –
6 yaşlı bacısı, atası, nənəsi və babası –
amansız şəkildə öldürüldü.

Murad öldürülərkən ifrit onun ruhuna aşiq oldu
və onu həmin evdə həbs etdi.

İndi isə sən o evə daxil olacaqsan...

Muradı xilas edə biləcəksən?`;

let i = 0;

function typeWriter(){
if(i < text.length){
document.getElementById("story").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}

typeWriter();

</script>

</body>
</html>
