<!DOCTYPE html>
<html lang="az">
<head> 
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ünvan - Biz Haradayıq?</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0b0b0b; font-family: 'Segoe UI', sans-serif; }
        
        .unvan-container {
            padding: 60px 20px; /* Boşluq artırıldı ki, daha geniş görünsün */
            text-align: center;
            color: white;
            margin-top: 40px;
        }

        /* Ünvan Kartı - Daha böyük və işıqlı */
        .address-card {
            background: rgba(255, 255, 255, 0.08);
            padding: 45px; /* Kart böyüdüldü */
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            margin-bottom: 50px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .address-card b { 
            color: #ff4d4d; 
            font-size: 30px; /* Sumqayıt yazısı böyüdüldü */
            display: block; 
            margin-bottom: 20px; 
            text-shadow: 0 0 15px rgba(255, 77, 77, 0.7);
            font-weight: 800;
        }

        .address-card p { 
            font-size: 22px; /* Ünvan mətni böyüdüldü */
            color: #ffffff; 
            line-height: 1.8; 
            margin: 0;
            font-weight: 500;
        }

        /* Düymə Qrupu */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 380px; /* Düymə sahəsi genişləndirildi */
            margin: 0 auto;
        }

        /* Düymələrin stili */
        .map-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px; /* Düymələr böyüdüldü */
            border-radius: 18px;
            font-weight: 800;
            text-decoration: none;
            color: white;
            font-size: 19px; /* Yazı ölçüsü artırıldı */
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: none;
        }

        .google-btn {
            background: linear-gradient(135deg, #4285F4, #34a853);
            box-shadow: 0 8px 25px rgba(66, 133, 244, 0.5);
        }

        .waze-btn {
            background: linear-gradient(135deg, #33CCFF, #29a3cc);
            color: #000;
            box-shadow: 0 8px 25px rgba(51, 204, 255, 0.5);
        }

        .map-btn:hover {
            transform: scale(1.08);
            filter: brightness(1.3);
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-title">ÜNVANIMIZ</div>
    <div class="burger" onclick="toggleMenu()" id="burger">☰</div>
</div>

<div class="unvan-container">
    <div class="address-card">
        <b>📍 Sumqayıt şəhəri</b>
        <p>Mərkəzi poçtla üzbəüz,<br>Sumqayıt Özəl Gimnaziyasının yanı</p>
    </div>

    <div class="btn-group">
        <a href="https://www.google.com/maps/dir/?api=1&destination=40.5902,49.6702" target="_blank" class="map-btn google-btn">
             MƏKAN (GOOGLE MAPS)
        </a>

        <a href="https://waze.com/ul?ll=40.5902,49.6702&navigate=yes" target="_blank" class="map-btn waze-btn">
             YOLU GÖSTƏR (WAZE)
        </a>
    </div>
</div>

<script>
    function toggleMenu() {
        var menu = document.getElementById("menu");
        var burger = document.getElementById("burger");
        if (menu.classList.contains("active")) {
            menu.classList.remove("active");
            burger.innerText = "☰";
        } else {
            menu.classList.add("active");
            burger.innerText = "✕";
        }
    }
</script>

</body>
</html>
