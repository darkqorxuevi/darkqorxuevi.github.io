<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ünvan - Biz Haradayıq?</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0b0b0b; font-family: 'Segoe UI', sans-serif; }
        
        .unvan-container {
            padding: 30px 20px;
            text-align: center;
            color: white;
            margin-top: 30px;
            animation: fadeIn 0.8s ease-in;
        }

        .address-card {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        .address-card b { color: #ff4d4d; font-size: 22px; display: block; margin-bottom: 10px; }
        .address-card p { font-size: 16px; color: #ccc; line-height: 1.6; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 300px;
            margin: 0 auto;
        }

        .map-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Google Maps Düyməsi */
        .google-btn {
            background: #4285F4;
            border-bottom: 4px solid #3367d6;
        }
        .google-btn:hover { background: #357ae8; transform: translateY(-2px); }

        /* Waze Düyməsi */
        .waze-btn {
            background: #33CCFF;
            color: #002d33;
            border-bottom: 4px solid #29a3cc;
        }
        .waze-btn:hover { background: #2bbbe6; transform: translateY(-2px); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="side-menu" id="menu">
    <a href="index.html">Ana Səhifə</a>
    <a href="about.html">Haqqımızda</a>
    <a href="games.html">Oyunlar</a>
    <a href="rejimler.html">Rejimlər</a>
</div>

<div class="topbar">
    <div class="topbar-title">ÜNVANIMIZ</div>
    <div class="burger" onclick="toggleMenu()" id="burger">☰</div>
</div>

<div class="unvan-container">
    <div class="address-card">
        <b>📍 Sumqayıt şəhəri</b>
        <p>Mərkəzi poçtla üzbəüz,<br>Sumqayıt Özəl Gimnaziyasının yanı</p>
    </div>

    <div class="btn-group">
        <a href="https://www.google.com/maps/search/?api=1&query=40.5902,49.6702" target="_blank" class="map-btn google-btn">
             Məkan (Google Maps)
        </a>

        <a href="https://waze.com/ul?ll=40.5902,49.6702&navigate=yes" target="_blank" class="map-btn waze-btn">
             Yolu göstər (Waze)
        </a>
    </div>
</div>

<script>
    function toggleMenu() {
        var menu = document.getElementById("menu");
        var burger = document.getElementById("burger");
        if (menu.classList.contains("active")) {
            menu.classList.remove("active");
            burger.innerText = "☰";
        } else {
            menu.classList.add("active");
            burger.innerText = "✕";
        }
    }
</script>

</body>
</html>
