<!DOCTYPE html>
<html lang="az">
<head> 
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ünvan - Biz Haradayıq?</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0b0b0b; font-family: 'Segoe UI', sans-serif; }
        
        .unvan-container {
            padding: 40px 20px;
            text-align: center;
            color: white;
            margin-top: 20px;
        }

        /* Ünvan Kartı - Daha aydın və işıqlı */
        .address-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            margin-bottom: 40px;
        }

        .address-card b { 
            color: #ff4d4d; 
            font-size: 24px; 
            display: block; 
            margin-bottom: 15px; 
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }

        .address-card p { 
            font-size: 18px; 
            color: #ffffff; 
            line-height: 1.6; 
            margin: 0;
        }

        /* Düymə Qrupu */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 320px;
            margin: 0 auto;
        }

        /* Düymələrin ümumi stili - Qaranlıq deyil, canlı rənglər */
        .map-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border-radius: 15px;
            font-weight: 800;
            text-decoration: none;
            color: white;
            font-size: 17px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
        }

        /* Google Maps - Parlaq Göy */
        .google-btn {
            background: linear-gradient(135deg, #4285F4, #34a853);
            box-shadow: 0 5px 20px rgba(66, 133, 244, 0.4);
        }

        /* Waze - Parlaq Mavi */
        .waze-btn {
            background: linear-gradient(135deg, #33CCFF, #29a3cc);
            color: #000;
            box-shadow: 0 5px 20px rgba(51, 204, 255, 0.4);
        }

        .map-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .map-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="side-menu" id="menu">
    <a href="index.html">Ana Səhifə</a>
    <a href="about.html">Haqqımızda</a>
    <a href="games.html">Oyunlar</a>
    <a href="rejimler.html">Rejimlər</a>
</div>

<div class="topbar">
    <div class="topbar-title">ÜNVANIMIZ</div>
    <div class="burger" onclick="toggleMenu()" id="burger">☰</div>
</div>

<div class="unvan-container">
    <div class="address-card">
        <b>📍 Sumqayıt şəhəri</b>
        <p>Mərkəzi poçtla üzbəüz,<br>Gimnaziyasının yanı</p>
    </div>

    <div class="btn-group">
      <a href="https://www.google.com/maps/search/?api=1&query=DARK+Horror+House+Sumqayit" 
   target="_blank" 
   class="map-btn google-maps">
   MƏKAN (GOOGLE MAPS)
</a>

<a href="https://waze.com/ul?q=DARK+Horror+House+Sumqayit&ll=40.5897,49.6687&navigate=yes" 
   target="_blank" 
   class="map-btn waze">
   YOLU GÖSTƏR (WAZE)
</a>
   </div>
</div>

<script>
    function toggleMenu() {
        var menu = document.getElementById("menu");
        var burger = document.getElementById("burger");
        if (menu.classList.contains("active")) {
            menu.classList.remove("active");
            burger.innerText = "☰";
        } else {
            menu.classList.add("active");
            burger.innerText = "✕";
        }
    }
</script>

</body>
</html>
