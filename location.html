<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ünvan - Biz Haradayıq?</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .unvan-container {
            padding: 20px;
            text-align: center;
            color: white;
            margin-top: 50px;
        }

        .address-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed #777;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .map-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: 0.3s;
        }

        /* Google Maps rəngi */
        .google-btn {
            background-color: #4285F4;
        }

        /* Waze rəngi */
        .waze-btn {
            background-color: #33CCFF;
            color: #000;
        }

        .map-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="side-menu" id="menu">
    <a href="index.html">Ana Səhifə</a>
    <a href="about.html">Haqqımızda</a>
    <a href="games.html">Oyunlar</a>
    <a href="rejimler.html">Rejimlər</a>
</div>

<div class="topbar">
    <div class="topbar-title">Ünvanımız</div>
    <div class="burger" onclick="toggleMenu()" id="burger">☰</div>
</div>

<div class="unvan-container">
    <div class="address-text">
        📍 <b>Sumqayıt şəhəri</b><br>
        Mərkəzi poçtla üzbəüz,<br>
        Gimnaziyanın yanı
    </div>

    <div class="btn-group">
        <a href="https://www.google.com/maps/search/?api=1&query=Sumqayıt+Gimnaziya" target="_blank" class="map-btn google-btn">
            Məkan (Google Maps)
        </a>

        <a href="https://waze.com/ul?q=Sumqayıt+Gimnaziya&navigate=yes" target="_blank" class="map-btn waze-btn">
            Yolu göstər (Waze)
        </a>
    </div>
</div>

<script>
    function toggleMenu() {
        var menu = document.getElementById("menu");
        var burger = document.getElementById("burger");
        if (menu.classList.contains("active")) {
            menu.classList.remove("active");
            burger.innerText = "☰";
        } else {
            menu.classList.add("active");
            burger.innerText = "✕";
        }
    }
</script>

</body>
</html>
